<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sandbox</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: #0a0a12;
    display: flex;
    height: 100vh;
    overflow: hidden;
    font-family: 'Segoe UI', sans-serif;
    color: #ccc;
  }

  #canvas-container {
    flex: 1;
    display: flex;
    align-items: center;
    justify-content: center;
    overflow: hidden;
    background: #070714;
  }
  canvas {
    display: block;
    image-rendering: pixelated;
    cursor: crosshair;
  }

  #panel {
    width: 180px;
    flex-shrink: 0;
    background: #0d0d1a;
    padding: 16px 12px;
    display: flex;
    flex-direction: column;
    gap: 8px;
    border-left: 2px solid #1a1a3a;
    overflow-y: auto;
    user-select: none;
  }
  #panel h2 {
    font-size: 14px;
    text-align: center;
    color: #5555aa;
    letter-spacing: 3px;
    margin-bottom: 8px;
    text-transform: uppercase;
    text-shadow: 0 0 12px rgba(80,80,200,0.3);
  }
  .tools-group { display: flex; flex-direction: column; gap: 4px; }
  .tools-group label {
    font-size: 11px;
    color: #555;
    text-transform: uppercase;
    letter-spacing: 1px;
  }
  .tool-btn {
    display: flex;
    align-items: center;
    gap: 8px;
    padding: 8px 10px;
    background: #12122a;
    border: 1px solid #222244;
    border-radius: 6px;
    color: #999;
    font-size: 13px;
    cursor: pointer;
    transition: all 0.2s;
    box-shadow: 0 0 4px transparent;
  }
  .tool-btn:hover {
    background: #1a1a3a;
    border-color: #4444aa;
    box-shadow: 0 0 12px rgba(100,100,255,0.15);
    color: #ccc;
  }
  .tool-btn.active {
    color: #fff;
    border-color: #6666ff;
  }
  .tool-btn .color-dot {
    width: 18px; height: 18px; border-radius: 4px;
    flex-shrink: 0;
    border: 1px solid rgba(255,255,255,0.1);
  }
  #brush-group { margin-top: 4px; }
  #brush-group input[type=range],
  #speed-group input[type=range] {
    width: 100%;
    -webkit-appearance: none;
    appearance: none;
    background: #12122a;
    height: 6px;
    border-radius: 3px;
    outline: none;
  }
  #brush-group input[type=range]::-webkit-slider-thumb,
  #speed-group input[type=range]::-webkit-slider-thumb {
    -webkit-appearance: none;
    width: 16px; height: 16px;
    border-radius: 50%;
    background: #6666ff;
    cursor: pointer;
    box-shadow: 0 0 10px rgba(100,100,255,0.4);
  }
  #brush-value, #speed-value {
    font-size: 13px; color: #5555aa; text-align: center;
  }
  #clear-btn {
    padding: 10px;
    background: #1a0a0a;
    border: 1px solid #442222;
    border-radius: 6px;
    color: #aa4444;
    font-size: 13px;
    cursor: pointer;
    text-transform: uppercase;
    letter-spacing: 1px;
    margin-top: auto;
    transition: all 0.2s;
    box-shadow: 0 0 4px transparent;
  }
  #clear-btn:hover {
    background: #2a1010;
    border-color: #663333;
    color: #dd6666;
    box-shadow: 0 0 16px rgba(200,50,50,0.2);
  }
  #fps-counter {
    font-size: 11px;
    color: #444;
    text-align: center;
    margin-top: 4px;
  }

  @media (max-width: 640px) {
    body { flex-direction: column-reverse; }
    #panel {
      width: 100%; height: 120px;
      flex-direction: row; flex-wrap: wrap;
      padding: 8px; gap: 4px;
      border-left: none; border-top: 2px solid #1a1a3a;
      align-content: flex-start;
      overflow-y: visible;
    }
    #panel h2 { display: none; }
    .tools-group { flex-direction: row; flex-wrap: wrap; }
    .tool-btn { padding: 4px 8px; font-size: 11px; }
    .tool-btn .color-dot { width: 14px; height: 14px; }
    #brush-group { display: flex; align-items: center; gap: 6px; }
    #brush-group input[type=range] { width: 80px; }
    #speed-group { display: flex; align-items: center; gap: 6px; }
    #speed-group input[type=range] { width: 80px; }
    #clear-btn { margin-top: 0; padding: 6px 12px; font-size: 11px; }
    #fps-counter { display: none; }
    #canvas-container { min-height: 0; }
  }
</style>
</head>
<body>

<div id="canvas-container">
  <canvas id="canvas"></canvas>
</div>

<div id="panel">
  <h2>Sandbox</h2>

  <div class="tools-group">
    <label>Основное</label>
    <button class="tool-btn active" data-element="sand" style="--glow:#d4a843">
      <span class="color-dot" style="background:#d4a843;box-shadow:0 0 6px rgba(212,168,67,0.3)"></span> Песок
    </button>
    <button class="tool-btn" data-element="water" style="--glow:#3388dd">
      <span class="color-dot" style="background:#3388dd;box-shadow:0 0 6px rgba(51,136,221,0.3)"></span> Вода
    </button>
    <button class="tool-btn" data-element="wall" style="--glow:#667788">
      <span class="color-dot" style="background:#667788;box-shadow:0 0 6px rgba(102,119,136,0.3)"></span> Стена
    </button>
    <button class="tool-btn" data-element="acid" style="--glow:#66dd33">
      <span class="color-dot" style="background:#66dd33;box-shadow:0 0 6px rgba(102,221,51,0.4)"></span> Кислота
    </button>
    <button class="tool-btn" data-element="fire" style="--glow:#ff6622">
      <span class="color-dot" style="background:#ff6622;box-shadow:0 0 8px rgba(255,102,34,0.5)"></span> Огонь
    </button>
    <button class="tool-btn" data-element="wood" style="--glow:#6b4423">
      <span class="color-dot" style="background:#6b4423;box-shadow:0 0 6px rgba(107,68,35,0.3)"></span> Дерево
    </button>
    <button class="tool-btn" data-element="gasoline" style="--glow:#ffcc33">
      <span class="color-dot" style="background:#ffcc33;box-shadow:0 0 8px rgba(255,200,50,0.5)"></span> Бензин
    </button>
    <button class="tool-btn" data-element="lava" style="--glow:#ff5511">
      <span class="color-dot" style="background:#ff5511;box-shadow:0 0 10px rgba(255,80,20,0.6)"></span> Лава
    </button>
  </div>

  <div class="tools-group">
    <label>Взрывчатка</label>
    <button class="tool-btn" data-element="gunpowder" style="--glow:#887766">
      <span class="color-dot" style="background:#554433;box-shadow:0 0 6px rgba(100,80,60,0.3)"></span> Порох
    </button>
    <button class="tool-btn" data-element="fuse" style="--glow:#ccaa66">
      <span class="color-dot" style="background:#ccaa66;box-shadow:0 0 6px rgba(200,170,100,0.3)"></span> Фитиль
    </button>
    <button class="tool-btn" data-element="c4" style="--glow:#ccbb99">
      <span class="color-dot" style="background:#b0a080;box-shadow:0 0 6px rgba(180,160,130,0.3)"></span> C4
    </button>
    <button class="tool-btn" data-element="uranium" style="--glow:#33ff33">
      <span class="color-dot" style="background:#33ff33;box-shadow:0 0 10px rgba(51,255,51,0.6)"></span> Уран
    </button>
    <button class="tool-btn" data-element="sparkler" style="--glow:#ffdd44">
      <span class="color-dot" style="background:#ffcc33;box-shadow:0 0 10px rgba(255,220,68,0.6)"></span> Бенгальский
    </button>
  </div>

  <div class="tools-group">
    <label>Электроника</label>
    <button class="tool-btn" data-element="battery" style="--glow:#ffaa33">
      <span class="color-dot" style="background:#dd8822;box-shadow:0 0 8px rgba(255,170,50,0.5)"></span> Батарея
    </button>
    <button class="tool-btn" data-element="wire" style="--glow:#66aadd">
      <span class="color-dot" style="background:#667788;box-shadow:0 0 6px rgba(100,170,220,0.3)"></span> Кабель
    </button>
    <button class="tool-btn" data-element="switch" style="--glow:#66dd66">
      <span class="color-dot" style="background:#666677;box-shadow:0 0 6px rgba(100,220,100,0.3)"></span> Выключатель
    </button>
    <button class="tool-btn" data-element="led" style="--glow:#ffee66">
      <span class="color-dot" style="background:#887744;box-shadow:0 0 6px rgba(255,238,100,0.3)"></span> Лампочка
    </button>
    <button class="tool-btn" data-element="heater" style="--glow:#ff5533">
      <span class="color-dot" style="background:#993333;box-shadow:0 0 6px rgba(255,80,50,0.3)"></span> Нагреватель
    </button>
    <button class="tool-btn" data-element="steamgen" style="--glow:#4488cc">
      <span class="color-dot" style="background:#556688;box-shadow:0 0 8px rgba(60,140,220,0.5)"></span> Парогенератор
    </button>
    <button class="tool-btn" data-element="heatwire" style="--glow:#ff7722">
      <span class="color-dot" style="background:#cc6611;box-shadow:0 0 8px rgba(255,119,34,0.5)"></span> Нагрев.кабель
    </button>
  </div>

  <div class="tools-group">
    <label>Энергия</label>
    <button class="tool-btn" data-element="turbine" style="--glow:#66ddff">
      <span class="color-dot" style="background:#4488aa;box-shadow:0 0 8px rgba(100,220,255,0.5)"></span> Турбина
    </button>
    <button class="tool-btn" data-element="cooler" style="--glow:#88ddff">
      <span class="color-dot" style="background:#3388bb;box-shadow:0 0 8px rgba(130,220,255,0.5)"></span> Охладитель
    </button>
  </div>

  <div class="tools-group">
    <label>Механика</label>
    <button class="tool-btn" data-element="piston" style="--glow:#dd9966">
      <span class="color-dot" style="background:#996644;box-shadow:0 0 6px rgba(220,150,100,0.4)"></span> Поршень
    </button>
    <button class="tool-btn" data-element="sensor" style="--glow:#99ddff">
      <span class="color-dot" style="background:#5599bb;box-shadow:0 0 8px rgba(150,220,255,0.5)"></span> Сенсор
    </button>
  </div>

  <div class="tools-group">
    <label>Биология</label>
    <button class="tool-btn" data-element="seeds" style="--glow:#66dd66">
      <span class="color-dot" style="background:#44aa44;box-shadow:0 0 6px rgba(100,220,100,0.4)"></span> Семена
    </button>
    <button class="tool-btn" data-element="spore" style="--glow:#cc66dd">
      <span class="color-dot" style="background:#8844aa;box-shadow:0 0 8px rgba(200,100,220,0.5)"></span> Споры
    </button>
  </div>

  <div class="tools-group">
    <label>Утилиты</label>
    <button class="tool-btn" data-element="steam" style="--glow:#ccdddd">
      <span class="color-dot" style="background:#ccdddd;box-shadow:0 0 6px rgba(200,210,220,0.3)"></span> Пар
    </button>
    <button class="tool-btn" data-element="ash" style="--glow:#aaa99a">
      <span class="color-dot" style="background:#aaa99a;box-shadow:0 0 6px rgba(160,155,150,0.3)"></span> Пепел
    </button>
    <button class="tool-btn" data-element="source" style="--glow:#55ccff">
      <span class="color-dot" style="background:#55ccff;box-shadow:0 0 8px rgba(80,200,255,0.5)"></span> Источник
    </button>
    <button class="tool-btn" data-element="mover" style="--glow:#00cccc">
      <span class="color-dot" style="background:#00cccc;box-shadow:0 0 8px rgba(0,204,204,0.5)"></span> Движок
    </button>
    <button class="tool-btn" data-element="smoke" style="--glow:#888888">
      <span class="color-dot" style="background:#888888;box-shadow:0 0 6px rgba(130,130,135,0.3)"></span> Дым
    </button>
  </div>

  <div class="tools-group">
    <button id="eraser-btn" style="padding:8px;background:#1a1a2a;border:1px solid #444;border-radius:6px;color:#aaa;font-size:13px;cursor:pointer;text-transform:uppercase;letter-spacing:1px;margin-top:2px;transition:all 0.2s;">🧹 Ластик</button>
  </div>

  <div class="tools-group" id="brush-group">
    <label>Кисть</label>
    <input type="range" id="brush-slider" min="1" max="12" value="3">
    <span id="brush-value">3</span>
  </div>

  <div class="tools-group" id="speed-group">
    <label>Скорость</label>
    <input type="range" id="speed-slider" min="1" max="20" value="10" step="1">
    <span id="speed-value">1.0x</span>
  </div>

  <div class="tools-group">
    <label>Мультиплеер</label>
    <div id="mp-status" style="font-size:10px;color:#666;text-align:center;margin-top:2px">Подключение...</div>
  </div>

  <button id="pause-btn" style="padding:8px;background:#1a1a2a;border:1px solid #442266;border-radius:6px;color:#aa88dd;font-size:13px;cursor:pointer;text-transform:uppercase;letter-spacing:1px;margin-top:4px;transition:all 0.2s;">Пауза (Пробел)</button>
  <button id="clear-btn">Очистить всё</button>
  <div id="fps-counter">-- FPS</div>
</div>

<script>
"use strict";

// ----- Settings -----
const COLS = 200;
const ROWS = 200;

const ELEMENT_COLORS = {
  sand:    { r: 212, g: 168, b: 67 },
  water:   { r: 51,  g: 136, b: 221 },
  wall:    { r: 102, g: 119, b: 136 },
  acid:    { r: 102, g: 221, b: 51 },
  fire:    { r: 255, g: 102, b: 34 },
  wood:    { r: 107, g: 68,  b: 35 },
  smoke:   { r: 130, g: 130, b: 135 },
  mover:   { r: 0,   g: 204, b: 204 },
  uranium: { r: 50,  g: 255, b: 50 },
  ash:     { r: 160, g: 155, b: 150 },
  steam:   { r: 200, g: 210, b: 220 },
  source:  { r: 80,  g: 200, b: 255 },
  gunpowder: { r: 60,  g: 55,  b: 50 },
  fuse:      { r: 190, g: 170, b: 130 },
  c4:        { r: 160, g: 150, b: 120 },
  battery:   { r: 220, g: 130, b: 50 },
  wire:      { r: 120, g: 130, b: 150 },
  switch:    { r: 140, g: 140, b: 160 },
  led:       { r: 100, g: 90,  b: 40 },
  heater:    { r: 140, g: 50,  b: 50 },
  steamgen:  { r: 70,  g: 100, b: 140 },
  turbine:   { r: 60,  g: 140, b: 170 },
  cooler:    { r: 80,  g: 160, b: 200 },
  piston:    { r: 160, g: 110, b: 70 },
  sensor:    { r: 100, g: 170, b: 210 },
  seeds:     { r: 60,  g: 160, b: 60 },
  spore:     { r: 150, g: 70,  b: 180 },
  heatwire:  { r: 200, g: 100, b: 30 },
  sparkler:  { r: 255, g: 220, b: 100 },
  gasoline:  { r: 255, g: 200, b: 50 },
  lava:      { r: 240, g: 80,  b: 20 },
  stone:     { r: 100, g: 95,  b: 90 },
};

let selectedElement = 'sand';
let brushSize = 3;
let speed = 1.0;
let updateAccum = 0;
const MAX_STEPS_PER_FRAME = 4;
let explosionFlash = { timer: 0, maxT: 15, x: 0, y: 0, radius: 30 };
let paused = false;
let eraserMode = false;
let zoom = 1;
let mouseX = -1, mouseY = -1;
let mouseOverCanvas = false;

// ----- Grid -----
let grid = [];

function initGrid() {
  grid = [];
  for (let y = 0; y < ROWS; y++) {
    grid[y] = new Array(COLS).fill(null);
  }
}

function clearGrid() { initGrid(); }

function inBounds(x, y) {
  return x >= 0 && x < COLS && y >= 0 && y < ROWS;
}

function isEmpty(x, y) {
  return inBounds(x, y) && grid[y][x] === null;
}

function getCell(x, y) {
  return inBounds(x, y) ? grid[y][x] : null;
}

function setCell(x, y, val) {
  if (inBounds(x, y)) grid[y][x] = val;
}

function moveCell(x1, y1, x2, y2) {
  if (!inBounds(x1, y1) || !inBounds(x2, y2)) return;
  grid[y2][x2] = grid[y1][x1];
  grid[y1][x1] = null;
}

// ----- Canvas Setup -----
const canvas = document.getElementById('canvas');
const ctx = canvas.getContext('2d');
canvas.width = COLS;
canvas.height = ROWS;

function resizeCanvas() {
  const container = canvas.parentElement;
  const maxW = container.clientWidth;
  const maxH = container.clientHeight;
  const scale = Math.min(maxW / COLS, maxH / ROWS) * zoom;
  canvas.style.width = Math.floor(COLS * scale) + 'px';
  canvas.style.height = Math.floor(ROWS * scale) + 'px';
}
resizeCanvas();
window.addEventListener('resize', resizeCanvas);

const glowCanvas = document.createElement('canvas');
const gctx = glowCanvas.getContext('2d');
glowCanvas.width = COLS;
glowCanvas.height = ROWS;

// ----- Heat System -----

// Blend a base colour toward red/orange/yellow based on temperature.
// Returns an rgb CSS string when hot, or null when cold.
function heatBlend(r, g, b, temp) {
  if (!temp || temp <= 0) return null;
  const t = Math.min(temp / 900, 1);
  const blend = Math.min(temp / 150, 1);
  let hr, hg, hb;
  if (t < 0.4) {
    const s = t / 0.4;
    hr = 255; hg = 60 + 160 * s; hb = 0;
  } else if (t < 0.7) {
    const s = (t - 0.4) / 0.3;
    hr = 255; hg = 220 + 35 * s; hb = 0 + 40 * s;
  } else {
    const s = (t - 0.7) / 0.3;
    hr = 255; hg = 255; hb = 40 + 100 * s;
  }
  return `rgb(${r + (hr - r) * blend | 0},${g + (hg - g) * blend | 0},${b + (hb - b) * blend | 0})`;
}

// Transfer heat to four orthogonal neighbours.
function handleHeat(cell, x, y) {
  if (!cell.temp || cell.temp <= 0) return;
  cell.temp *= 0.995;
  if (cell.temp < 0.5) { cell.temp = 0; return; }
  const amount = Math.max(0, cell.temp * 0.015);
  if (amount < 0.3) return;
  const dirs = [[0,1],[0,-1],[1,0],[-1,0]];
  for (const [dx, dy] of dirs) {
    const nx = x + dx, ny = y + dy;
    if (!inBounds(nx, ny)) continue;
    const n = grid[ny][nx];
    if (n !== null) {
      n.temp = (n.temp || 0) + amount;
      cell.temp -= amount;
    }
  }
}

// ----- Fire colour gradient -----
function getFireColor(life, maxLife) {
  const t = Math.max(0, Math.min(1, life / maxLife));
  let r, g, b;
  if (t > 0.7) {
    const s = (t - 0.7) / 0.3;
    r = 255; g = 130 + 125 * s; b = 30 + 120 * s;
  } else if (t > 0.4) {
    const s = (t - 0.4) / 0.3;
    r = 255; g = 100 + 30 * s; b = 10 + 20 * s;
  } else if (t > 0.15) {
    const s = (t - 0.15) / 0.25;
    r = 255; g = 40 + 60 * s; b = 0 + 10 * s;
  } else {
    const s = t / 0.15;
    r = 40 + 215 * s; g = 0 + 40 * s; b = 0;
  }
  return { r: r|0, g: g|0, b: b|0 };
}

// ----- Rendering -----

function drawCell(x, y, cell) {
  switch (cell.type) {

    case 'sand': {
      const v = (cell.seed / 255 - 0.5) * 35;
      ctx.fillStyle = `rgb(${212 + v|0}, ${168 + v * 0.6|0}, ${67 + v * 0.4|0})`;
      ctx.fillRect(x, y, 1, 1);
      return false;
    }

    case 'water': {
      const p = cell.pressure || 0;
      const bright = 1 - Math.min(p / 20, 1) * 0.5;
      const r = Math.floor(30 + 30 * bright);
      const g = Math.floor(80 + 80 * bright);
      const b = Math.floor(160 + 60 * bright);
      ctx.fillStyle = `rgba(${r},${g},${b},0.6)`;
      ctx.fillRect(x, y, 1, 1);
      return false;
    }

    case 'wall': {
      const v = (cell.seed / 255 - 0.5) * 20;
      const heat = heatBlend(102 + v, 119 + v, 136 + v, cell.temp);
      ctx.fillStyle = heat || `rgb(${102 + v|0}, ${119 + v|0}, ${136 + v|0})`;
      ctx.fillRect(x, y, 1, 1);
      return false;
    }

    case 'acid': {
      const v = (cell.seed / 255 - 0.5) * 25;
      ctx.fillStyle = `rgb(${102 + v|0}, ${221 + v * 0.6|0}, ${51 + v * 0.3|0})`;
      ctx.fillRect(x, y, 1, 1);
      return true;
    }

    case 'fire': {
      const fc = getFireColor(cell.life, cell.maxLife);
      ctx.fillStyle = `rgb(${fc.r},${fc.g},${fc.b})`;
      ctx.fillRect(x, y, 1, 1);
      return true;
    }

    case 'wood': {
      if (cell.burning) {
        const p = Math.min(cell.burnProgress, 100) / 100;
        let r, g, b;
        if (p < 0.3) {
          const t = p / 0.3;
          r = 107 - 50 * t; g = 68 - 45 * t; b = 35 - 28 * t;
        } else if (p < 0.6) {
          const t = (p - 0.3) / 0.3;
          r = 57 - 32 * t; g = 23 - 16 * t; b = 7 - 5 * t;
        } else if (p < 0.85) {
          const t = (p - 0.6) / 0.25;
          r = 25 + 45 * t; g = 7 + 35 * t; b = 2 + 12 * t;
        } else {
          const t = (p - 0.85) / 0.15;
          r = 70 + 160 * t; g = 42 + 55 * t; b = 14 + 15 * t;
        }
        const heat = heatBlend(r, g, b, cell.temp);
        ctx.fillStyle = heat || `rgb(${r|0},${g|0},${b|0})`;
        ctx.fillRect(x, y, 1, 1);
        return p > 0.5;
      }
      const v = (cell.seed / 255 - 0.5) * 18;
      const heat = heatBlend(107 + v, 68 + v * 0.7, 35 + v * 0.5, cell.temp);
      ctx.fillStyle = heat || `rgb(${107 + v|0}, ${68 + v * 0.7|0}, ${35 + v * 0.5|0})`;
      ctx.fillRect(x, y, 1, 1);
      return false;
    }

    case 'smoke': {
      const alpha = Math.max(0.05, (cell.life / cell.maxLife)) * 0.45;
      const drift = Math.sin(cell.seed * 0.1 + cell.life * 0.05) * 8;
      const t = cell.temp || 0;
      const r = 130 + drift + t * 0.05;
      const g = 130 + drift - t * 0.02;
      const b = 135 + drift - t * 0.04;
      ctx.fillStyle = `rgba(${r|0},${g|0},${b|0},${alpha})`;
      ctx.fillRect(x, y, 1, 1);
      return false;
    }

    case 'mover': {
      const pulse = Math.sin(Date.now() * 0.004 + cell.seed) * 15;
      ctx.fillStyle = `rgb(${0 + pulse|0}, ${204 + pulse * 0.3|0}, ${204 + pulse * 0.3|0})`;
      ctx.fillRect(x, y, 1, 1);
      return true;
    }

    case 'uranium': {
      const pulse = Math.sin(Date.now() * 0.003 + cell.seed * 2) * 15;
      const t = cell.temp || 0;

      // Base neon green; shifts toward yellow → orange as temp rises
      let r = 40, g = 210, b = 40;
      if (t > 50) {
        const heat = Math.min((t - 50) / 100, 1); // 0→1 as temp goes 50→150
        r = 40 + (220 - 40) * heat;
        g = 210 - (210 - 100) * heat;
        b = 40 * (1 - heat * 0.8);
      }
      r += pulse * 0.3;
      g += pulse * 0.2;

      ctx.fillStyle = `rgb(${r|0},${g|0},${b|0})`;
      ctx.fillRect(x, y, 1, 1);
      return true;
    }

    case 'gunpowder': {
      const v = (cell.seed / 255 - 0.5) * 12;
      ctx.fillStyle = `rgb(${60 + v|0}, ${55 + v|0}, ${50 + v|0})`;
      ctx.fillRect(x, y, 1, 1);
      return false;
    }

    case 'fuse': {
      if (cell.lit) {
        const p = Math.min(1, Math.max(0, cell.life / (cell.maxLife || 1)));
        let r, g, b;
        if (p > 0.6) {
          const t = (p - 0.6) / 0.4;
          r = 255; g = 160 + 95 * t; b = 20 + 200 * t;
        } else if (p > 0.25) {
          const t = (p - 0.25) / 0.35;
          r = 255; g = 60 + 100 * t; b = 0 + 20 * t;
        } else {
          const t = p / 0.25;
          r = 40 + 215 * t; g = 0 + 60 * t; b = 0;
        }
        ctx.fillStyle = `rgb(${r|0},${g|0},${b|0})`;
      } else {
        const v = (cell.seed / 255 - 0.5) * 15;
        ctx.fillStyle = `rgb(${190 + v|0}, ${170 + v|0}, ${130 + v|0})`;
      }
      ctx.fillRect(x, y, 1, 1);
      return cell.lit;
    }

    case 'c4': {
      const v = (cell.seed / 255 - 0.5) * 10;
      const heat = heatBlend(160 + v, 150 + v, 120 + v, cell.temp);
      ctx.fillStyle = heat || `rgb(${160 + v|0},${150 + v|0},${120 + v|0})`;
      ctx.fillRect(x, y, 1, 1);
      return false;
    }

    case 'ash': {
      const v = (cell.seed / 255 - 0.5) * 15;
      const gray = 150 + v;
      ctx.fillStyle = `rgb(${gray|0},${gray|0},${gray|0})`;
      ctx.fillRect(x, y, 1, 1);
      return false;
    }

    case 'steam': {
      const alpha = Math.max(0.08, (cell.life / cell.maxLife)) * 0.5;
      const drift = Math.sin(cell.seed * 0.1 + cell.life * 0.05) * 6;
      const bright = 200 + drift + ((cell.temp || 0) * 0.02);
      ctx.fillStyle = `rgba(${bright|0},${bright + 10|0},${bright + 20|0},${alpha})`;
      ctx.fillRect(x, y, 1, 1);
      return false;
    }

    case 'source': {
      const pulse = Math.sin(Date.now() * 0.003 + cell.seed * 2) * 15;
      const r = 60 + pulse * 0.3;
      const g = 180 + pulse * 0.4;
      const b = 255;
      ctx.fillStyle = `rgb(${r|0},${g|0},${b|0})`;
      ctx.fillRect(x, y, 1, 1);
      return true;
    }

    case 'battery': {
      ctx.fillStyle = '#dd8822';
      ctx.fillRect(x, y, 1, 1);
      return true;
    }

    case 'wire': {
      const v = (cell.seed / 255 - 0.5) * 15;
      if (cell.powered) {
        const bright = Math.min(1, (cell.life || 0) / 5);
        const r = 80 + 100 * bright;
        const g = 100 + 80 * bright;
        const b = 130 + 120 * bright;
        ctx.fillStyle = `rgb(${r|0},${g|0},${b|0})`;
      } else {
        ctx.fillStyle = `rgb(${120 + v|0}, ${130 + v|0}, ${150 + v|0})`;
      }
      ctx.fillRect(x, y, 1, 1);
      return !!cell.powered;
    }

    case 'switch': {
      if (cell.active) {
        const g = cell.powered ? 200 : 140;
        ctx.fillStyle = `rgb(60,${g},60)`;
      } else {
        ctx.fillStyle = '#666677';
      }
      ctx.fillRect(x, y, 1, 1);
      return !!cell.powered;
    }

    case 'led': {
      if (cell.powered) {
        const t = Math.min(1, (cell.life || 0) / 20);
        const r = 150 + 105 * t;
        const g = 150 + 105 * t;
        const b = 100 + 155 * t;
        ctx.fillStyle = `rgb(${r|0},${g|0},${b|0})`;
      } else {
        ctx.fillStyle = '#554422';
      }
      ctx.fillRect(x, y, 1, 1);
      return !!cell.powered;
    }

    case 'heater': {
      if (cell.powered) {
        const t = Math.min(1, (cell.temp || 0) / 500);
        const r = 130 + 125 * t;
        const g = 40 + 100 * t * 0.4;
        const b = 40;
        ctx.fillStyle = `rgb(${r|0},${g|0},${b|0})`;
      } else {
        ctx.fillStyle = '#882222';
      }
      ctx.fillRect(x, y, 1, 1);
      return cell.powered || (cell.temp || 0) > 100;
    }

    case 'steamgen': {
      const v = (cell.seed / 255 - 0.5) * 12;
      const r = 65 + v, g = 95 + v * 0.7, b = 135 + v * 0.5;
      if (cell.powered) {
        const t = Math.min(1, (cell.life || 0) / 5);
        ctx.fillStyle = `rgb(${r|0}, ${g + 80 * t|0}, ${b + 100 * t|0})`;
      } else {
        ctx.fillStyle = `rgb(${r|0}, ${g|0}, ${b|0})`;
      }
      ctx.fillRect(x, y, 1, 1);
      return !!cell.powered;
    }

    case 'turbine': {
      const v = (cell.seed / 255 - 0.5) * 10;
      if (cell.powered) {
        const pulse = Math.sin(Date.now() * 0.006 + cell.seed) * 0.3 + 0.7;
        const r = Math.floor(60 + 180 * pulse * (cell.life / 20));
        const g = Math.floor(140 + 100 * pulse * (cell.life / 20));
        const b = Math.floor(170 + 80 * pulse * (cell.life / 20));
        ctx.fillStyle = `rgb(${r},${g},${b})`;
      } else {
        ctx.fillStyle = `rgb(${60 + v|0}, ${140 + v * 0.5|0}, ${170 + v * 0.3|0})`;
      }
      ctx.fillRect(x, y, 1, 1);
      return !!cell.powered;
    }

    case 'cooler': {
      const v = (cell.seed / 255 - 0.5) * 10;
      ctx.fillStyle = `rgb(${80 + v|0}, ${160 + v * 0.5|0}, ${200 + v * 0.3|0})`;
      ctx.fillRect(x, y, 1, 1);
      return false;
    }

    case 'piston': {
      const base = cell.extended ? 180 : 140;
      const v = (cell.seed / 255 - 0.5) * 12;
      ctx.fillStyle = `rgb(${base + v|0}, ${(base - 40) + v * 0.6|0}, ${(base - 70) + v * 0.4|0})`;
      ctx.fillRect(x, y, 1, 1);
      return !!cell.powered;
    }

    case 'sensor': {
      const v = (cell.seed / 255 - 0.5) * 10;
      if (cell.powered) {
        const t = Math.min(1, (cell.life || 0) / 5);
        ctx.fillStyle = `rgb(${100 + 155 * t + v|0}, ${170 + 80 * t + v * 0.5|0}, ${210 + 40 * t + v * 0.3|0})`;
      } else {
        ctx.fillStyle = `rgb(${100 + v|0}, ${170 + v * 0.5|0}, ${210 + v * 0.3|0})`;
      }
      ctx.fillRect(x, y, 1, 1);
      return !!cell.powered;
    }

    case 'seeds': {
      const v = (cell.seed / 255 - 0.5) * 15;
      ctx.fillStyle = `rgb(${60 + v|0}, ${160 + v * 0.6|0}, ${60 + v * 0.3|0})`;
      ctx.fillRect(x, y, 1, 1);
      return false;
    }

    case 'spore': {
      const pulse = Math.sin(Date.now() * 0.005 + cell.seed) * 10;
      const v = (cell.seed / 255 - 0.5) * 15;
      ctx.fillStyle = `rgb(${150 + v + pulse|0}, ${70 + v * 0.3 + pulse * 0.3|0}, ${180 + v * 0.5 + pulse|0})`;
      ctx.fillRect(x, y, 1, 1);
      return true;
    }

    case 'heatwire': {
      if (cell.powered) {
        const t = Math.min(1, (cell.temp || 0) / 300);
        const r = 200 + 55 * t;
        const g = 80 + 100 * (1 - t) * 0.8;
        const b = 30 * (1 - t);
        ctx.fillStyle = `rgb(${r|0},${g|0},${b|0})`;
      } else {
        const v = (cell.seed / 255 - 0.5) * 15;
        ctx.fillStyle = `rgb(${120 + v|0}, ${130 + v|0}, ${150 + v|0})`;
      }
      ctx.fillRect(x, y, 1, 1);
      return !!cell.powered;
    }

    case 'sparkler': {
      const sparkle = Math.sin(Date.now() * 0.01 + cell.seed * 3) * 30;
      const lifeFactor = Math.max(0.3, (cell.life || 100) / (cell.maxLife || 100));
      const r = 255;
      const g = 200 + sparkle * 0.5;
      const b = 50 + sparkle;
      ctx.fillStyle = `rgb(${r|0},${g|0},${b|0})`;
      ctx.fillRect(x, y, 1, 1);
      return true;
    }

    case 'gasoline': {
      const slosh = Math.sin(cell.seed * 0.5 + (cell.life || 0) * 0.1) * 8;
      ctx.fillStyle = `rgba(${255},${200 + slosh|0},${50 + slosh * 0.5|0},0.7)`;
      ctx.fillRect(x, y, 1, 1);
      return true;
    }

    case 'lava': {
      const pulse = Math.sin(Date.now() * 0.005 + cell.seed) * 15;
      const r = 240;
      const g = 60 + pulse * 0.5;
      const b = 10;
      const heat = heatBlend(r, g, b, cell.temp || 1000);
      ctx.fillStyle = heat || `rgb(${r|0},${g|0},${b|0})`;
      ctx.fillRect(x, y, 1, 1);
      return true;
    }

    case 'stone': {
      const v = (cell.seed / 255 - 0.5) * 15;
      const heat = heatBlend(100 + v, 95 + v, 90 + v, cell.temp);
      ctx.fillStyle = heat || `rgb(${100 + v|0},${95 + v|0},${90 + v|0})`;
      ctx.fillRect(x, y, 1, 1);
      return false;
    }

    default:
      return false;
  }
}

function render() {
  const grad = ctx.createLinearGradient(0, 0, 0, ROWS);
  grad.addColorStop(0, '#070714');
  grad.addColorStop(0.4, '#0a0a1e');
  grad.addColorStop(0.7, '#080818');
  grad.addColorStop(1, '#04040a');
  ctx.fillStyle = grad;
  ctx.fillRect(0, 0, COLS, ROWS);

  gctx.clearRect(0, 0, COLS, ROWS);

  for (let y = 0; y < ROWS; y++) {
    for (let x = 0; x < COLS; x++) {
      const cell = grid[y][x];
      if (!cell) continue;
      const needsGlow = drawCell(x, y, cell);
      if (needsGlow) {
        if (cell.type === 'acid') {
          gctx.fillStyle = 'rgba(102,221,51,0.25)';
        } else if (cell.type === 'mover') {
          gctx.fillStyle = 'rgba(0,204,204,0.25)';
        } else if (cell.type === 'uranium') {
          const intensity = 0.25 + Math.min((cell.temp || 0) / 150, 1) * 0.35;
          gctx.fillStyle = `rgba(50,255,50,${intensity})`;
        } else if (cell.type === 'source') {
          gctx.fillStyle = 'rgba(80,200,255,0.35)';
        } else if (cell.type === 'battery') {
          gctx.fillStyle = 'rgba(255,180,50,0.40)';
        } else if (cell.type === 'wire' && cell.powered) {
          const i = Math.min(1, (cell.life || 0) / 5);
          gctx.fillStyle = `rgba(50,180,255,${0.15 + 0.25 * i})`;
        } else if (cell.type === 'switch' && cell.powered) {
          gctx.fillStyle = 'rgba(50,255,50,0.35)';
        } else if (cell.type === 'led' && cell.powered) {
          const i = Math.min(1, (cell.life || 0) / 20);
          gctx.fillStyle = `rgba(255,255,200,${0.20 + 0.40 * i})`;
        } else if (cell.type === 'heater' && cell.powered) {
          const i = Math.min(1, (cell.temp || 0) / 500);
          gctx.fillStyle = `rgba(255,80,30,${0.15 + 0.35 * i})`;
        } else if (cell.type === 'steamgen' && cell.powered) {
          const i = Math.min(1, (cell.life || 0) / 5);
          gctx.fillStyle = `rgba(60,180,255,${0.10 + 0.30 * i})`;
        } else if (cell.type === 'turbine' && cell.powered) {
          const i = Math.min(1, (cell.life || 0) / 5);
          gctx.fillStyle = `rgba(100,220,255,${0.10 + 0.30 * i})`;
        } else if (cell.type === 'piston' && cell.powered) {
          gctx.fillStyle = 'rgba(220,150,100,0.25)';
        } else if (cell.type === 'sensor' && cell.powered) {
          const i = Math.min(1, (cell.life || 0) / 5);
          gctx.fillStyle = `rgba(150,220,255,${0.10 + 0.25 * i})`;
        } else if (cell.type === 'spore') {
          gctx.fillStyle = 'rgba(200,100,220,0.20)';
        } else if (cell.type === 'heatwire' && cell.powered) {
          const i = Math.min(1, (cell.temp || 0) / 300);
          gctx.fillStyle = `rgba(255,120,40,${0.15 + 0.40 * i})`;
        } else if (cell.type === 'sparkler') {
          const i = Math.max(0.2, (cell.life || 0) / (cell.maxLife || 100));
          gctx.fillStyle = `rgba(255,220,100,${0.20 + 0.35 * i})`;
        } else {
          gctx.fillStyle = 'rgba(255,120,40,0.30)';
        }
        gctx.fillRect(x, y, 1, 1);
      }
    }
  }

  ctx.save();
  ctx.globalCompositeOperation = 'screen';
  ctx.filter = 'blur(2px)';
  ctx.drawImage(glowCanvas, 0, 0);
  ctx.restore();

  // Explosion flash overlay
  if (explosionFlash.timer > 0) {
    const t = explosionFlash.timer;
    const maxT = explosionFlash.maxT || 15;
    const intensity = t / maxT;
    const fx = explosionFlash.x, fy = explosionFlash.y;
    const radius = explosionFlash.radius || 30;

    ctx.save();
    ctx.globalCompositeOperation = 'screen';

    // Core white flash
    const grad = ctx.createRadialGradient(fx, fy, 0, fx, fy, radius + (maxT - t) * 5);
    grad.addColorStop(0, `rgba(255,255,255,${0.95 * intensity})`);
    grad.addColorStop(0.1, `rgba(255,255,200,${0.8 * intensity})`);
    grad.addColorStop(0.3, `rgba(255,200,100,${0.5 * intensity})`);
    grad.addColorStop(0.6, `rgba(255,120,40,${0.25 * intensity})`);
    grad.addColorStop(1, 'rgba(255,50,10,0)');
    ctx.fillStyle = grad;
    ctx.filter = 'blur(2px)';
    ctx.fillRect(0, 0, COLS, ROWS);

    // Shockwave ring
    if (t > maxT * 0.3) {
      const ringRadius = radius * (1 + (maxT - t) / maxT * 1.5);
      const ringWidth = 8 + (maxT - t) * 0.5;
      ctx.beginPath();
      ctx.arc(fx, fy, ringRadius, 0, Math.PI * 2);
      ctx.strokeStyle = `rgba(255,220,150,${0.3 * intensity})`;
      ctx.lineWidth = ringWidth;
      ctx.filter = 'blur(4px)';
      ctx.stroke();
    }

    // Spark rays
    if (t > maxT * 0.5) {
      for (let i = 0; i < 12; i++) {
        const angle = (i / 12) * Math.PI * 2 + t * 0.2;
        const dist = radius * 0.3 + Math.random() * radius * 0.4;
        const sx = fx + Math.cos(angle) * dist;
        const sy = fy + Math.sin(angle) * dist;
        const sparkSize = 2 + Math.random() * 3;
        ctx.fillStyle = `rgba(255,255,200,${0.2 * intensity})`;
        ctx.filter = 'blur(1px)';
        ctx.fillRect(sx - sparkSize/2, sy - sparkSize/2, sparkSize, sparkSize);
      }
    }

    ctx.restore();
    explosionFlash.timer--;
  }

  // Friend cursor
  if (friendCursor) {
    friendCursorTimer--;
    if (friendCursorTimer <= 0) { friendCursor = null; }
    else {
      const alpha = Math.min(1, friendCursorTimer / 30) * 0.8;
      ctx.save();
      ctx.strokeStyle = `rgba(255,200,100,${alpha})`;
      ctx.lineWidth = 2;
      ctx.shadowColor = 'rgba(255,200,100,0.5)';
      ctx.shadowBlur = 6;
      ctx.strokeRect(friendCursor.x - 2, friendCursor.y - 2, 4, 4);
      ctx.fillStyle = `rgba(255,200,100,${alpha * 0.3})`;
      ctx.fillRect(friendCursor.x - 3, friendCursor.y - 3, 6, 6);
      ctx.restore();
    }
  }

  // Brush preview circle
  if (mouseOverCanvas && mouseX >= 0 && mouseY >= 0) {
    const r = brushSize / 2;
    ctx.save();
    ctx.strokeStyle = eraserMode ? 'rgba(255,100,100,0.5)' : 'rgba(255,255,255,0.25)';
    ctx.lineWidth = 1;
    ctx.setLineDash([3, 3]);
    ctx.beginPath();
    ctx.arc(mouseX, mouseY, r, 0, Math.PI * 2);
    ctx.stroke();
    ctx.restore();
  }
}

// ----- Element Spawning -----
function spawnElement(x, y, type) {
  if (!inBounds(x, y)) return;
  if (grid[y][x] !== null) return;

  const cell = { type: type, seed: Math.floor(Math.random() * 256), temp: 0 };

  if (type === 'fire') {
    cell.maxLife = 60 + Math.floor(Math.random() * 60);
    cell.life = cell.maxLife;
    cell.temp = 600 + Math.floor(Math.random() * 200);
  } else if (type === 'smoke') {
    cell.maxLife = 30 + Math.floor(Math.random() * 20);
    cell.life = cell.maxLife;
  } else if (type === 'uranium') {
    cell.temp = 30 + Math.floor(Math.random() * 20);
  } else if (type === 'steam') {
    cell.maxLife = 40 + Math.floor(Math.random() * 30);
    cell.life = cell.maxLife;
    cell.temp = 80 + Math.floor(Math.random() * 40);
  } else if (type === 'battery') {
    cell.powered = true;
    cell.life = 5;
  } else if (type === 'switch') {
    cell.active = false;
  } else if (type === 'sparkler') {
    cell.maxLife = 300 + Math.floor(Math.random() * 200);
    cell.life = cell.maxLife;
    cell.temp = 200;
  } else if (type === 'gasoline') {
    cell.temp = 20;
  } else if (type === 'lava') {
    cell.temp = 800 + Math.floor(Math.random() * 400);
  }

  grid[y][x] = cell;
  playSpawnSound();
}

function spawnBrushAt(mx, my, element) {
  const cx = Math.floor(mx);
  const cy = Math.floor(my);
  const half = Math.floor(brushSize / 2);

  for (let dy = 0; dy < brushSize; dy++) {
    for (let dx = 0; dx < brushSize; dx++) {
      const x = cx + dx - half;
      const y = cy + dy - half;
      if (brushSize > 2) {
        const dist = Math.abs(dx - half) + Math.abs(dy - half);
        if (dist > half && Math.random() > 0.4) continue;
      }
      spawnElement(x, y, element);
    }
  }

  if (element === 'fire' && brushSize >= 2) {
    for (let i = 0; i < brushSize * 2; i++) {
      const ox = cx + Math.floor(Math.random() * brushSize) - half;
      const oy = cy + Math.floor(Math.random() * brushSize) - half;
      spawnElement(ox, oy, 'fire');
    }
  }
}

function placeAtMouse(mx, my) {
  const cx = Math.floor(mx);
  const cy = Math.floor(my);
  if (eraserMode) {
    const half = Math.floor(brushSize / 2);
    for (let dy = 0; dy < brushSize; dy++) {
      for (let dx = 0; dx < brushSize; dx++) {
        const x = cx + dx - half;
        const y = cy + dy - half;
        if (inBounds(x, y)) grid[y][x] = null;
      }
    }
    return;
  }
  if (selectedElement === 'switch') {
    const cell = getCell(cx, cy);
    if (cell && cell.type === 'switch') {
      cell.active = !cell.active;
      return;
    }
  }
  spawnBrushAt(mx, my, selectedElement);
}

// Map CSS coords → canvas grid
function canvasCoords(e) {
  const rect = canvas.getBoundingClientRect();
  return {
    mx: (e.clientX - rect.left) * canvas.width / rect.width,
    my: (e.clientY - rect.top)  * canvas.height / rect.height,
  };
}

// ----- Mouse / Touch Input -----
let isMouseDown = false;

canvas.addEventListener('mousedown', (e) => {
  initAudio();
  isMouseDown = true;
  if (e.button === 2) { eraserMode = true; }
  const { mx, my } = canvasCoords(e);
  placeAtMouse(mx, my);
});
canvas.addEventListener('mousemove', (e) => {
  const { mx, my } = canvasCoords(e);
  mouseX = mx; mouseY = my;
  if (isMouseDown) {
    placeAtMouse(mx, my);
    sendWS({ type: 'cursor', x: mx, y: my });
  }
});
canvas.addEventListener('mouseup',   () => { isMouseDown = false; eraserMode = false; });
canvas.addEventListener('mouseleave', () => { isMouseDown = false; mouseOverCanvas = false; });
canvas.addEventListener('mouseenter', () => { mouseOverCanvas = true; });

canvas.addEventListener('wheel', (e) => {
  e.preventDefault();
  const delta = e.deltaY > 0 ? -0.1 : 0.1;
  zoom = Math.max(0.5, Math.min(5, zoom + delta));
  resizeCanvas();
}, { passive: false });

canvas.addEventListener('contextmenu', (e) => e.preventDefault());

canvas.addEventListener('touchstart', (e) => {
  e.preventDefault();
  const { mx, my } = canvasCoords(e.touches[0]);
  mouseX = mx; mouseY = my;
  isMouseDown = true;
  placeAtMouse(mx, my);
}, { passive: false });
canvas.addEventListener('touchmove', (e) => {
  e.preventDefault();
  if (isMouseDown) {
    const { mx, my } = canvasCoords(e.touches[0]);
    mouseX = mx; mouseY = my;
    placeAtMouse(mx, my);
  }
}, { passive: false });
canvas.addEventListener('touchend', () => { isMouseDown = false; });

function applyButtonGlow(btn, active) {
  const color = btn.style.getPropertyValue('--glow').trim();
  if (active) {
    btn.style.boxShadow = `0 0 10px ${color}, 0 0 25px ${color}`;
    btn.style.borderColor = color;
    btn.style.background = '#1a1a3a';
  } else {
    btn.style.boxShadow = 'none';
    btn.style.borderColor = '#222244';
    btn.style.background = '#12122a';
  }
}

document.querySelectorAll('.tool-btn').forEach(btn => {

      b.classList.remove('active');
      applyButtonGlow(b, false);

    btn.classList.add('active');
    applyButtonGlow(btn, true);
    selectedElement = btn.dataset.element;

  if (btn.classList.contains('active')) {
    applyButtonGlow(btn, true);

});
