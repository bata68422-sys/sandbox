<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sandbox</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: #06060e;
    display: flex;
    height: 100vh;
    overflow: hidden;
    font-family: 'Segoe UI', sans-serif;
    color: #ccc;
  }

  #canvas-container {
    flex: 1;
    display: flex;
    align-items: center;
    justify-content: center;
    overflow: hidden;
    background: radial-gradient(ellipse at center, #0a0a20 0%, #060610 50%, #02020a 100%);
  }
  canvas {
    display: block;
    image-rendering: pixelated;
    cursor: crosshair;
    box-shadow: 0 0 60px rgba(40,60,120,0.15), inset 0 0 40px rgba(0,0,0,0.3);
    border-radius: 2px;
  }

  #panel {
    width: 180px;
    flex-shrink: 0;
    background: rgba(15,15,25,0.85);
    backdrop-filter: blur(10px);
    -webkit-backdrop-filter: blur(10px);
    padding: 16px 12px;
    display: flex;
    flex-direction: column;
    gap: 8px;
    border-left: 1px solid rgba(60,60,120,0.3);
    overflow-y: auto;
    user-select: none;
  }
  #panel h2 {
    font-size: 14px;
    text-align: center;
    color: #6677bb;
    letter-spacing: 3px;
    margin-bottom: 8px;
    text-transform: uppercase;
    text-shadow: 0 0 16px rgba(80,100,220,0.4);
  }
  .tools-group { display: flex; flex-direction: column; gap: 4px; }
  .tools-group label {
    font-size: 11px;
    color: #556;
    text-transform: uppercase;
    letter-spacing: 1px;
    text-shadow: 0 0 4px rgba(80,80,160,0.15);
  }
  .tool-btn {
    display: flex;
    align-items: center;
    gap: 8px;
    padding: 8px 10px;
    background: rgba(18,18,35,0.7);
    border: 1px solid rgba(40,40,80,0.4);
    border-radius: 6px;
    color: #999;
    font-size: 13px;
    cursor: pointer;
    transition: all 0.25s ease;
    box-shadow: 0 0 4px transparent;
    backdrop-filter: blur(4px);
  }
  .tool-btn:hover {
    background: rgba(28,28,50,0.8);
    border-color: rgba(100,100,200,0.5);
    box-shadow: 0 0 16px rgba(100,100,255,0.12), inset 0 0 8px rgba(100,100,255,0.05);
    color: #ddd;
  }
  .tool-btn.active {
    color: #fff;
    border-color: var(--glow, rgba(100,100,200,0.7));
    box-shadow: 0 0 18px var(--glow, rgba(100,100,200,0.2)), inset 0 0 6px rgba(255,255,255,0.03);
  }
  .tool-btn .color-dot {
    width: 18px; height: 18px; border-radius: 4px;
    flex-shrink: 0;
    border: 1px solid rgba(255,255,255,0.12);
    transition: transform 0.2s, box-shadow 0.2s;
  }
  .tool-btn:hover .color-dot {
    transform: scale(1.12);
    box-shadow: 0 0 8px currentColor;
  }
  #brush-group { margin-top: 4px; }
  #brush-group input[type=range],
  #speed-group input[type=range] {
    width: 100%;
    -webkit-appearance: none;
    appearance: none;
    background: rgba(18,18,35,0.6);
    height: 6px;
    border-radius: 3px;
    outline: none;
  }
  #brush-group input[type=range]::-webkit-slider-thumb,
  #speed-group input[type=range]::-webkit-slider-thumb {
    -webkit-appearance: none;
    width: 16px; height: 16px;
    border-radius: 50%;
    background: #6677cc;
    cursor: pointer;
    box-shadow: 0 0 12px rgba(80,100,200,0.5);
  }
  #brush-value, #speed-value {
    font-size: 13px; color: #6677bb; text-align: center;
    text-shadow: 0 0 6px rgba(80,100,200,0.2);
  }
  #clear-btn {
    padding: 10px;
    background: rgba(26,10,10,0.7);
    border: 1px solid rgba(80,30,30,0.5);
    border-radius: 6px;
    color: #aa5555;
    font-size: 13px;
    cursor: pointer;
    text-transform: uppercase;
    letter-spacing: 1px;
    margin-top: auto;
    transition: all 0.25s ease;
    box-shadow: 0 0 4px transparent;
    backdrop-filter: blur(4px);
  }
  #clear-btn:hover {
    background: rgba(40,16,16,0.8);
    border-color: rgba(120,50,50,0.7);
    color: #dd7777;
    box-shadow: 0 0 20px rgba(200,50,50,0.2), inset 0 0 8px rgba(200,50,50,0.05);
  }
  #fps-counter {
    font-size: 11px;
    color: rgba(70,70,100,0.7);
    text-align: center;
    margin-top: 4px;
    text-shadow: 0 0 4px rgba(60,60,120,0.15);
  }
  #thermo-display {
    position: fixed; bottom: 10px; left: 10px;
    font-size: 12px; color: #ff9944;
    background: rgba(10,10,22,0.85);
    backdrop-filter: blur(6px);
    padding: 5px 12px; border-radius: 6px;
    border: 1px solid rgba(60,50,30,0.4);
    pointer-events: none; z-index: 100;
    font-family: 'Segoe UI', monospace;
    display: none;
    text-shadow: 0 0 6px rgba(255,150,60,0.2);
  }

  #chat-container::-webkit-scrollbar { width: 4px; }
  #chat-container::-webkit-scrollbar-thumb { background: rgba(40,40,80,0.5); border-radius: 2px; }
  #chat-log div { line-height: 1.4; }
  .ping-btn:hover { border-color: rgba(100,100,200,0.5); box-shadow: 0 0 10px rgba(100,100,255,0.15); }
  .ping-btn.active { border-color: #ffcc00; box-shadow: 0 0 16px rgba(255,200,0,0.3); }
  #mission-banner { transition: opacity 0.5s; }
  #ping-dot { transition: color 0.3s; }

  @media (max-width: 640px) {
    body { flex-direction: column-reverse; }
    #panel {
      width: 100%; height: 120px;
      flex-direction: row; flex-wrap: wrap;
      padding: 8px; gap: 4px;
      border-left: none; border-top: 1px solid rgba(60,60,120,0.3);
      align-content: flex-start;
      overflow-y: visible;
      backdrop-filter: blur(6px);
    }
    #panel h2 { display: none; }
    .tools-group { flex-direction: row; flex-wrap: wrap; }
    .tool-btn { padding: 4px 8px; font-size: 11px; }
    .tool-btn .color-dot { width: 14px; height: 14px; }
    #brush-group { display: flex; align-items: center; gap: 6px; }
    #brush-group input[type=range] { width: 80px; }
    #speed-group { display: flex; align-items: center; gap: 6px; }
    #speed-group input[type=range] { width: 80px; }
    #clear-btn { margin-top: 0; padding: 6px 12px; font-size: 11px; }
    #fps-counter { display: none; }
    #canvas-container { min-height: 0; }
  }
</style>
</head>

<script>
"use strict";

// ----- Settings -----
const COLS = 200;
const ROWS = 200;

const ELEMENT_COLORS = {
  sand:    { r: 212, g: 168, b: 67 },
  water:   { r: 51,  g: 136, b: 221 },
  wall:    { r: 102, g: 119, b: 136 },
  acid:    { r: 102, g: 221, b: 51 },
  fire:    { r: 255, g: 102, b: 34 },
  wood:    { r: 107, g: 68,  b: 35 },
  smoke:   { r: 130, g: 130, b: 135 },
  mover:   { r: 0,   g: 204, b: 204 },
  uranium: { r: 50,  g: 255, b: 50 },
  ash:     { r: 160, g: 155, b: 150 },
  steam:   { r: 200, g: 210, b: 220 },
  source:  { r: 80,  g: 200, b: 255 },
  gunpowder: { r: 60,  g: 55,  b: 50 },
  fuse:      { r: 190, g: 170, b: 130 },
  c4:        { r: 160, g: 150, b: 120 },
  battery:   { r: 220, g: 130, b: 50 },
  wire:      { r: 120, g: 130, b: 150 },
  switch:    { r: 140, g: 140, b: 160 },
  led:       { r: 100, g: 90,  b: 40 },
  heater:    { r: 140, g: 50,  b: 50 },
  steamgen:  { r: 70,  g: 100, b: 140 },
  turbine:   { r: 60,  g: 140, b: 170 },
  cooler:    { r: 80,  g: 160, b: 200 },
  piston:    { r: 160, g: 110, b: 70 },
  sensor:    { r: 100, g: 170, b: 210 },
  seeds:     { r: 60,  g: 160, b: 60 },
  spore:     { r: 150, g: 70,  b: 180 },
  heatwire:  { r: 200, g: 100, b: 30 },
  sparkler:  { r: 255, g: 220, b: 100 },
  gasoline:  { r: 255, g: 200, b: 50 },
  lava:      { r: 240, g: 80,  b: 20 },
  stone:     { r: 100, g: 95,  b: 90 },
  tesla:     { r: 60,  g: 130, b: 220 },
  nitro:     { r: 160, g: 220, b: 255 },
  portal_blue:  { r: 50,  g: 100, b: 255 },
  portal_orange: { r: 255, g: 120, b: 40 },
  ice:       { r: 180, g: 210, b: 240 },
  meteor:    { r: 200, g: 60,  b: 30 },
  button:    { r: 140, g: 30,  b: 30 },
  oil:       { r: 200, g: 170, b: 50 },
  mud:       { r: 130, g: 110, b: 80 },
  glass:     { r: 130, g: 200, b: 220 },
  lead:      { r: 75,  g: 75,  b: 90 },
  blackhole: { r: 100, g: 40,  b: 180 },
  antigrav:  { r: 100, g: 220, b: 255 },
  acidgas:   { r: 100, g: 230, b: 50 },
  poison:    { r: 170, g: 50,  b: 200 },
  pressure_plate: { r: 120, g: 120, b: 140 },
  and_gate:  { r: 200, g: 170, b: 60 },
  not_gate:  { r: 200, g: 130, b: 60 },
  solar:     { r: 255, g: 220, b: 50 },
  fan:       { r: 60,  g: 170, b: 200 },
  delay:     { r: 170, g: 140, b: 110 },
  pump:      { r: 50,  g: 160, b: 180 },
  lightning_rod: { r: 100, g: 140, b: 210 },
  firefly:   { r: 255, g: 230, b: 80 },
  algae:     { r: 60,  g: 190, b: 100 },
  termite:   { r: 140, g: 80,  b: 50 },
  coral:     { r: 220, g: 100, b: 160 },
  root:      { r: 130, g: 100, b: 70 },
  pipe:      { r: 85,  g: 110, b: 130 },
};

let selectedElement = 'sand';
let brushSize = 3;
let speed = 1.0;
let updateAccum = 0;
const MAX_STEPS_PER_FRAME = 3;
let explosionFlash = { timer: 0, maxT: 15, x: 0, y: 0, radius: 30 };
let paused = false;
let zoom = 1;
let mouseX = -1, mouseY = -1;
let mouseOverCanvas = false;
let windPower = 0;
let gravityFactor = 1.0;
let pvpMode = false;
let isHost = true;
let selectedPing = '⚠️';
let pings = [];
let particles = [];
let selectMode = false;
let selectStart = null;
let selectEnd = null;
let blueprintCode = '';
let missions = [];
let missionActive = false;
let missionProgress = 0;
let missionMax = 1;
let missionType = '';
let chatLog = [];
let meteorCountdown = 0;
let teslaArcs = [];
let player = null;
let friendPlayer = null;
let keys = {};
let brushShape = 'circle';
let spectatorMode = false;
let showThermo = false;
let c4Detonated = false;
let hostPlaced = new Set();
let pingTimestamps = [];
let avgPing = 0;

// ----- Grid -----
let grid = [];

function initGrid() {
  grid = [];
  for (let y = 0; y < ROWS; y++) {
    grid[y] = new Array(COLS).fill(null);
  }
}

function clearGrid() { initGrid(); }

function inBounds(x, y) {
  return x >= 0 && x < COLS && y >= 0 && y < ROWS;
}

function isEmpty(x, y) {
  return inBounds(x, y) && grid[y][x] === null;
}

function getCell(x, y) {
  return inBounds(x, y) ? grid[y][x] : null;
}

function setCell(x, y, val) {
  if (inBounds(x, y)) grid[y][x] = val;
}

function moveCell(x1, y1, x2, y2) {
  if (!inBounds(x1, y1) || !inBounds(x2, y2)) return;
  grid[y2][x2] = grid[y1][x1];
  grid[y1][x1] = null;
}

// ----- Canvas Setup -----
const canvas = document.getElementById('canvas');
const ctx = canvas.getContext('2d');
canvas.width = COLS;
canvas.height = ROWS;

function resizeCanvas() {
  const container = canvas.parentElement;
  const maxW = container.clientWidth;
  const maxH = container.clientHeight;
  const scale = Math.min(maxW / COLS, maxH / ROWS) * zoom;
  canvas.style.width = Math.floor(COLS * scale) + 'px';
  canvas.style.height = Math.floor(ROWS * scale) + 'px';
}
resizeCanvas();
window.addEventListener('resize', resizeCanvas);

const glowCanvas = document.createElement('canvas');
const gctx = glowCanvas.getContext('2d');
glowCanvas.width = COLS;
glowCanvas.height = ROWS;

// ----- Heat System -----

// Blend a base colour toward red/orange/yellow based on temperature.
// Returns an rgb CSS string when hot, or null when cold.
function heatBlend(r, g, b, temp) {
  if (!temp || temp <= 0) return null;
  const t = Math.min(temp / 900, 1);
  const blend = Math.min(temp / 150, 1);
  let hr, hg, hb;
  if (t < 0.4) {
    const s = t / 0.4;
    hr = 255; hg = 60 + 160 * s; hb = 0;
  } else if (t < 0.7) {
    const s = (t - 0.4) / 0.3;
    hr = 255; hg = 220 + 35 * s; hb = 0 + 40 * s;
  } else {
    const s = (t - 0.7) / 0.3;
    hr = 255; hg = 255; hb = 40 + 100 * s;
  }
  return `rgb(${r + (hr - r) * blend | 0},${g + (hg - g) * blend | 0},${b + (hb - b) * blend | 0})`;
}

// Transfer heat to four orthogonal neighbours.
function handleHeat(cell, x, y) {
  if (!cell.temp || cell.temp <= 0) return;
  cell.temp *= 0.995;
  if (cell.temp < 0.5) { cell.temp = 0; return; }
  const amount = Math.max(0, cell.temp * 0.015);
  if (amount < 0.3) return;
  const dirs = [[0,1],[0,-1],[1,0],[-1,0]];
  for (const [dx, dy] of dirs) {
    const nx = x + dx, ny = y + dy;
    if (!inBounds(nx, ny)) continue;
    const n = grid[ny][nx];
    if (n !== null) {
      n.temp = (n.temp || 0) + amount;
      cell.temp -= amount;
    }
  }
}

// ----- Fire colour gradient -----
function getFireColor(life, maxLife) {
  const t = Math.max(0, Math.min(1, life / maxLife));
  let r, g, b;
  if (t > 0.7) {
    const s = (t - 0.7) / 0.3;
    r = 255; g = 130 + 125 * s; b = 30 + 120 * s;
  } else if (t > 0.4) {
    const s = (t - 0.4) / 0.3;
    r = 255; g = 100 + 30 * s; b = 10 + 20 * s;
  } else if (t > 0.15) {
    const s = (t - 0.15) / 0.25;
    r = 255; g = 40 + 60 * s; b = 0 + 10 * s;
  } else {
    const s = t / 0.15;
    r = 40 + 215 * s; g = 0 + 40 * s; b = 0;
  }
  return { r: r|0, g: g|0, b: b|0 };
}

// ----- Rendering -----

function liquidColor(type) {
  const c = ELEMENT_COLORS[type];
  if (!c) return null;
  return 'rgb(' + c.r + ',' + c.g + ',' + c.b + ')';
}

function drawCell(x, y, cell) {
  switch (cell.type) {

    case 'sand': {
      const v = (cell.seed / 255 - 0.5) * 45;
      ctx.fillStyle = `rgb(${212 + v|0}, ${168 + v * 0.6|0}, ${67 + v * 0.4|0})`;
      ctx.fillRect(x, y, 1, 1);
      return false;
    }

    case 'water': {
      const p = cell.pressure || 0;
      const bright = 1 - Math.min(p / 20, 1) * 0.5;
      const r = Math.floor(30 + 30 * bright);
      const g = Math.floor(80 + 80 * bright);
      const b = Math.floor(160 + 60 * bright);
      ctx.fillStyle = `rgba(${r},${g},${b},0.6)`;
      ctx.fillRect(x, y, 1, 1);
      return false;
    }

    case 'wall': {
      const v = (cell.seed / 255 - 0.5) * 20;
      const heat = heatBlend(102 + v, 119 + v, 136 + v, cell.temp);
      ctx.fillStyle = heat || `rgb(${102 + v|0}, ${119 + v|0}, ${136 + v|0})`;
      ctx.fillRect(x, y, 1, 1);
      return false;
    }

    case 'acid': {
      const v = (cell.seed / 255 - 0.5) * 25;
      ctx.fillStyle = `rgba(${102 + v|0}, ${221 + v * 0.6|0}, ${51 + v * 0.3|0},0.65)`;
      ctx.fillRect(x, y, 1, 1);
      return true;
    }

    case 'fire': {
      const fc = getFireColor(cell.life, cell.maxLife);
      const pulse = 0.7 + 0.3 * Math.sin(Date.now() / 100 + cell.seed);
      ctx.save();
      ctx.shadowBlur = 18 * pulse;
      ctx.shadowColor = 'rgba(255,130,50,0.8)';
      ctx.fillStyle = `rgb(${fc.r},${fc.g},${fc.b})`;
      ctx.fillRect(x, y, 1, 1);
      ctx.restore();
      return true;
    }

    case 'wood': {
      if (cell.burning) {
        const p = Math.min(cell.burnProgress, 100) / 100;
        let r, g, b;
        if (p < 0.3) {
          const t = p / 0.3;
          r = 107 - 50 * t; g = 68 - 45 * t; b = 35 - 28 * t;
        } else if (p < 0.6) {
          const t = (p - 0.3) / 0.3;
          r = 57 - 32 * t; g = 23 - 16 * t; b = 7 - 5 * t;
        } else if (p < 0.85) {
          const t = (p - 0.6) / 0.25;
          r = 25 + 45 * t; g = 7 + 35 * t; b = 2 + 12 * t;
        } else {
          const t = (p - 0.85) / 0.15;
          r = 70 + 160 * t; g = 42 + 55 * t; b = 14 + 15 * t;
        }
        const heat = heatBlend(r, g, b, cell.temp);
        ctx.fillStyle = heat || `rgb(${r|0},${g|0},${b|0})`;
        ctx.fillRect(x, y, 1, 1);
        return p > 0.5;
      }
      const v = (cell.seed / 255 - 0.5) * 18;
      const heat = heatBlend(107 + v, 68 + v * 0.7, 35 + v * 0.5, cell.temp);
      ctx.fillStyle = heat || `rgb(${107 + v|0}, ${68 + v * 0.7|0}, ${35 + v * 0.5|0})`;
      ctx.fillRect(x, y, 1, 1);
      return false;
    }

    case 'smoke': {
      const lifeFrac = Math.max(0.05, cell.life / cell.maxLife);
      const alpha = Math.min(0.7, lifeFrac * 0.8);
      const drift = Math.sin(cell.seed * 0.1 + cell.life * 0.05) * 6;
      const t = cell.temp || 0;
      const r = 105 + drift + t * 0.03;
      const g = 100 + drift - t * 0.02;
      const b = 110 + drift - t * 0.03;
      ctx.fillStyle = `rgba(${r|0},${g|0},${b|0},${alpha})`;
      ctx.fillRect(x, y, 1, 1);
      return false;
    }

    case 'mover': {
      const pulse = Math.sin(Date.now() * 0.004 + cell.seed) * 15;
      ctx.fillStyle = `rgb(${0 + pulse|0}, ${204 + pulse * 0.3|0}, ${204 + pulse * 0.3|0})`;
      ctx.fillRect(x, y, 1, 1);
      return true;
    }

    case 'button': {
      if (cell.pressed) {
        ctx.fillStyle = '#ff3333';
        ctx.fillRect(x, y, 1, 1);
        return true;
      }
      ctx.fillStyle = 'rgb(140,30,30)';
      ctx.fillRect(x, y, 1, 1);
      return false;
    }

    case 'uranium': {
      const seedV = (cell.seed / 255 - 0.5) * 10;
      const pulse = Math.sin(Date.now() * 0.003 + cell.seed * 2) * 15;
      const t = cell.temp || 0;

      let r = 40 + seedV, g = 210 + seedV * 0.5, b = 40 + seedV * 0.3;
      if (t > 50) {
        const heat = Math.min((t - 50) / 100, 1);
        r = 40 + (220 - 40) * heat;
        g = 210 - (210 - 100) * heat;
        b = 40 * (1 - heat * 0.8);
      }
      r += pulse * 0.3;
      g += pulse * 0.2;

      ctx.save();
      const gp = 0.75 + 0.25 * Math.sin(Date.now() / 90 + cell.seed * 3);
      ctx.shadowBlur = 14 * gp;
      ctx.shadowColor = `rgba(${r*0.3|0},${g*0.8|0},${b*0.3|0},0.7)`;
      ctx.fillStyle = `rgb(${r|0},${g|0},${b|0})`;
      ctx.fillRect(x, y, 1, 1);
      ctx.restore();
      return true;
    }

    case 'gunpowder': {
      const v = (cell.seed / 255 - 0.5) * 12;
      ctx.fillStyle = `rgb(${60 + v|0}, ${55 + v|0}, ${50 + v|0})`;
      ctx.fillRect(x, y, 1, 1);
      return false;
    }

    case 'fuse': {
      if (cell.lit) {
        const p = Math.min(1, Math.max(0, cell.life / (cell.maxLife || 1)));
        let r, g, b;
        if (p > 0.6) {
          const t = (p - 0.6) / 0.4;
          r = 255; g = 160 + 95 * t; b = 20 + 200 * t;
        } else if (p > 0.25) {
          const t = (p - 0.25) / 0.35;
          r = 255; g = 60 + 100 * t; b = 0 + 20 * t;
        } else {
          const t = p / 0.25;
          r = 40 + 215 * t; g = 0 + 60 * t; b = 0;
        }
        ctx.fillStyle = `rgb(${r|0},${g|0},${b|0})`;
      } else {
        const v = (cell.seed / 255 - 0.5) * 15;
        ctx.fillStyle = `rgb(${190 + v|0}, ${170 + v|0}, ${130 + v|0})`;
      }
      ctx.fillRect(x, y, 1, 1);
      return cell.lit;
    }

    case 'c4': {
      const v = (cell.seed / 255 - 0.5) * 10;
      const heat = heatBlend(160 + v, 150 + v, 120 + v, cell.temp);
      ctx.fillStyle = heat || `rgb(${160 + v|0},${150 + v|0},${120 + v|0})`;
      ctx.fillRect(x, y, 1, 1);
      return false;
    }

    case 'ash': {
      const v = (cell.seed / 255 - 0.5) * 15;
      const gray = 150 + v;
      ctx.fillStyle = `rgb(${gray|0},${gray|0},${gray|0})`;
      ctx.fillRect(x, y, 1, 1);
      return false;
    }

    case 'steam': {
      const alpha = Math.max(0.08, (cell.life / cell.maxLife)) * 0.5;
      const drift = Math.sin(cell.seed * 0.1 + cell.life * 0.05) * 6;
      const bright = 200 + drift + ((cell.temp || 0) * 0.02);
      ctx.fillStyle = `rgba(${bright|0},${bright + 10|0},${bright + 20|0},${alpha})`;
      ctx.fillRect(x, y, 1, 1);
      return false;
    }

    case 'source': {
      const pulse = Math.sin(Date.now() * 0.003 + cell.seed * 2) * 15;
      const r = 60 + pulse * 0.3;
      const g = 180 + pulse * 0.4;
      const b = 255;
      ctx.fillStyle = `rgb(${r|0},${g|0},${b|0})`;
      ctx.fillRect(x, y, 1, 1);
      return true;
    }

    case 'battery': {
      ctx.fillStyle = '#dd8822';
      ctx.fillRect(x, y, 1, 1);
      return true;
    }

    case 'wire': {
      const v = (cell.seed / 255 - 0.5) * 15;
      if (cell.powered) {
        const bright = Math.min(1, (cell.life || 0) / 5);
        const r = 80 + 100 * bright;
        const g = 100 + 80 * bright;
        const b = 130 + 120 * bright;
        ctx.fillStyle = `rgb(${r|0},${g|0},${b|0})`;
      } else {
        ctx.fillStyle = `rgb(${120 + v|0}, ${130 + v|0}, ${150 + v|0})`;
      }
      ctx.fillRect(x, y, 1, 1);
      return !!cell.powered;
    }

    case 'switch': {
      if (cell.active) {
        const g = cell.powered ? 200 : 140;
        ctx.fillStyle = `rgb(60,${g},60)`;
      } else {
        ctx.fillStyle = '#666677';
      }
      ctx.fillRect(x, y, 1, 1);
      return !!cell.powered;
    }

    case 'led': {
      if (cell.powered) {
        const t = Math.min(1, (cell.life || 0) / 20);
        const r = 150 + 105 * t;
        const g = 150 + 105 * t;
        const b = 100 + 155 * t;
        ctx.save();
        ctx.shadowBlur = 14;
        ctx.shadowColor = `rgba(${r|0},${g|0},${b|0},0.6)`;
        ctx.fillStyle = `rgb(${r|0},${g|0},${b|0})`;
        ctx.fillRect(x, y, 1, 1);
        ctx.restore();
      } else {
        ctx.fillStyle = '#554422';
        ctx.fillRect(x, y, 1, 1);
      }
      return !!cell.powered;
    }

    case 'heater': {
      if (cell.powered) {
        const t = Math.min(1, (cell.temp || 0) / 500);
        const r = 130 + 125 * t;
        const g = 40 + 100 * t * 0.4;
        const b = 40;
        ctx.fillStyle = `rgb(${r|0},${g|0},${b|0})`;
      } else {
        ctx.fillStyle = '#882222';
      }
      ctx.fillRect(x, y, 1, 1);
      return cell.powered || (cell.temp || 0) > 100;
    }

    case 'steamgen': {
      const v = (cell.seed / 255 - 0.5) * 12;
      const r = 65 + v, g = 95 + v * 0.7, b = 135 + v * 0.5;
      if (cell.powered) {
        const t = Math.min(1, (cell.life || 0) / 5);
        ctx.save();
        ctx.shadowBlur = 14;
        ctx.shadowColor = `rgba(60,200,255,0.6)`;
        ctx.fillStyle = `rgb(${r|0}, ${g + 80 * t|0}, ${b + 100 * t|0})`;
        ctx.fillRect(x, y, 1, 1);
        ctx.restore();
      } else {
        ctx.fillStyle = `rgb(${r|0}, ${g|0}, ${b|0})`;
        ctx.fillRect(x, y, 1, 1);
      }
      return !!cell.powered;
    }

    case 'turbine': {
      const v = (cell.seed / 255 - 0.5) * 10;
      if (cell.powered) {
        const pulse = Math.sin(Date.now() * 0.006 + cell.seed) * 0.3 + 0.7;
        const r = Math.floor(60 + 180 * pulse * (cell.life / 20));
        const g = Math.floor(140 + 100 * pulse * (cell.life / 20));
        const b = Math.floor(170 + 80 * pulse * (cell.life / 20));
        ctx.fillStyle = `rgb(${r},${g},${b})`;
      } else {
        ctx.fillStyle = `rgb(${60 + v|0}, ${140 + v * 0.5|0}, ${170 + v * 0.3|0})`;
      }
      ctx.fillRect(x, y, 1, 1);
      return !!cell.powered;
    }

    case 'cooler': {
      const v = (cell.seed / 255 - 0.5) * 10;
      ctx.fillStyle = `rgb(${80 + v|0}, ${160 + v * 0.5|0}, ${200 + v * 0.3|0})`;
      ctx.fillRect(x, y, 1, 1);
      return false;
    }

    case 'piston': {
      const base = cell.extended ? 180 : 140;
      const v = (cell.seed / 255 - 0.5) * 12;
      ctx.fillStyle = `rgb(${base + v|0}, ${(base - 40) + v * 0.6|0}, ${(base - 70) + v * 0.4|0})`;
      ctx.fillRect(x, y, 1, 1);
      return !!cell.powered;
    }

    case 'sensor': {
      const v = (cell.seed / 255 - 0.5) * 10;
      if (cell.powered) {
        const t = Math.min(1, (cell.life || 0) / 5);
        ctx.fillStyle = `rgb(${100 + 155 * t + v|0}, ${170 + 80 * t + v * 0.5|0}, ${210 + 40 * t + v * 0.3|0})`;
      } else {
        ctx.fillStyle = `rgb(${100 + v|0}, ${170 + v * 0.5|0}, ${210 + v * 0.3|0})`;
      }
      ctx.fillRect(x, y, 1, 1);
      return !!cell.powered;
    }

    case 'seeds': {
      const v = (cell.seed / 255 - 0.5) * 15;
      ctx.fillStyle = `rgb(${60 + v|0}, ${160 + v * 0.6|0}, ${60 + v * 0.3|0})`;
      ctx.fillRect(x, y, 1, 1);
      return false;
    }

    case 'spore': {
      const pulse = Math.sin(Date.now() * 0.005 + cell.seed) * 10;
      const v = (cell.seed / 255 - 0.5) * 15;
      ctx.fillStyle = `rgb(${150 + v + pulse|0}, ${70 + v * 0.3 + pulse * 0.3|0}, ${180 + v * 0.5 + pulse|0})`;
      ctx.fillRect(x, y, 1, 1);
      return true;
    }

    case 'heatwire': {
      if (cell.powered) {
        const t = Math.min(1, (cell.temp || 0) / 300);
        const r = 200 + 55 * t;
        const g = 80 + 100 * (1 - t) * 0.8;
        const b = 30 * (1 - t);
        ctx.fillStyle = `rgb(${r|0},${g|0},${b|0})`;
      } else {
        const v = (cell.seed / 255 - 0.5) * 15;
        ctx.fillStyle = `rgb(${120 + v|0}, ${130 + v|0}, ${150 + v|0})`;
      }
      ctx.fillRect(x, y, 1, 1);
      return !!cell.powered;
    }

    case 'sparkler': {
      const sparkle = Math.sin(Date.now() * 0.01 + cell.seed * 3) * 30;
      const lifeFactor = Math.max(0.3, (cell.life || 100) / (cell.maxLife || 100));
      const r = 255;
      const g = 200 + sparkle * 0.5;
      const b = 50 + sparkle;
      ctx.fillStyle = `rgb(${r|0},${g|0},${b|0})`;
      ctx.fillRect(x, y, 1, 1);
      return true;
    }

    case 'gasoline': {
      const slosh = Math.sin(cell.seed * 0.5 + (cell.life || 0) * 0.1) * 8;
      ctx.fillStyle = `rgba(${255},${200 + slosh|0},${50 + slosh * 0.5|0},0.7)`;
      ctx.fillRect(x, y, 1, 1);
      return true;
    }

    case 'lava': {
      const pulse = Math.sin(Date.now() * 0.005 + cell.seed) * 15;
      const r = 240;
      const g = 60 + pulse * 0.5;
      const b = 10;
      const heat = heatBlend(r, g, b, cell.temp || 1000);
      ctx.save();
      const glowPulse = 0.8 + 0.2 * Math.sin(Date.now() / 120 + cell.seed * 2);
      ctx.shadowBlur = 16 * glowPulse;
      ctx.shadowColor = 'rgba(255,60,10,0.7)';
      ctx.fillStyle = heat || `rgb(${r|0},${g|0},${b|0})`;
      ctx.fillRect(x, y, 1, 1);
      ctx.restore();
      return true;
    }

    case 'stone': {
      const v = (cell.seed / 255 - 0.5) * 15;
      const heat = heatBlend(100 + v, 95 + v, 90 + v, cell.temp);
      ctx.fillStyle = heat || `rgb(${100 + v|0},${95 + v|0},${90 + v|0})`;
      ctx.fillRect(x, y, 1, 1);
      return false;
    }

    case 'tesla': {
      const v = (cell.seed / 255 - 0.5) * 10;
      const glow = cell.powered ? 128 : 50;
      const r = 60 + glow * 0.4 + v;
      const g = 100 + glow * 0.5 + v;
      const b = 180 + glow * 0.6;
      if (cell.powered) {
        ctx.save();
        const gp = 0.7 + 0.3 * Math.sin(Date.now() / 80 + cell.seed);
        ctx.shadowBlur = 20 * gp;
        ctx.shadowColor = 'rgba(100,180,255,0.7)';
        ctx.fillStyle = `rgb(${r|0},${g|0},${b|0})`;
        ctx.fillRect(x, y, 1, 1);
        ctx.restore();
        return true;
      }
      ctx.fillStyle = `rgb(${r|0},${g|0},${b|0})`;
      ctx.fillRect(x, y, 1, 1);
      return !!cell.powered;
    }

    case 'nitro': {
      const wobble = Math.sin(Date.now() * 0.008 + cell.seed) * 10;
      const r = 160 + wobble * 0.3;
      const g = 220 + wobble * 0.2;
      const b = 255;
      ctx.fillStyle = `rgba(${r|0},${g|0},${b|0},0.8)`;
      ctx.fillRect(x, y, 1, 1);
      return true;
    }

    case 'portal_blue': {
      const pulse = Math.sin(Date.now() * 0.003 + cell.seed * 2) * 20;
      ctx.fillStyle = `rgb(${50 + pulse * 0.2|0},${100 + pulse|0},${255})`;
      ctx.fillRect(x, y, 1, 1);
      return true;
    }

    case 'portal_orange': {
      const pulse = Math.sin(Date.now() * 0.003 + cell.seed * 2) * 20;
      ctx.fillStyle = `rgb(${255},${130 + pulse|0},${50 + pulse * 0.3|0})`;
      ctx.fillRect(x, y, 1, 1);
      return true;
    }

    case 'ice': {
      const v = (cell.seed / 255 - 0.5) * 8;
      ctx.fillStyle = `rgba(${170 + v|0},${200 + v|0},${230 + v|0},0.7)`;
      ctx.fillRect(x, y, 1, 1);
      return false;
    }

    case 'meteor': {
      const pulse = Math.sin(Date.now() * 0.01 + cell.seed) * 20;
      const r = 230 + pulse * 0.3;
      const g = 50 + (cell.temp || 0) * 0.01;
      const b = 20;
      const heat = heatBlend(r, g, b, cell.temp || 1000);
      ctx.fillStyle = heat || `rgb(${r|0},${g|0},${b|0})`;
      ctx.fillRect(x, y, 1, 1);
      return true;
    }

    case 'oil': {
      const slosh = Math.sin(cell.seed * 0.5 + Date.now() * 0.001) * 8;
      ctx.fillStyle = `rgba(${200 + slosh|0},${170 + slosh * 0.3|0},${50 + slosh * 0.5|0},0.7)`;
      ctx.fillRect(x, y, 1, 1);
      return true;
    }

    case 'mud': {
      ctx.fillStyle = 'rgb(130,110,80)';
      ctx.fillRect(x, y, 1, 1);
      return false;
    }

    case 'glass': {
      const v = (cell.seed / 255 - 0.5) * 10;
      ctx.fillStyle = `rgba(${130 + v|0},${200 + v|0},${220 + v|0},0.5)`;
      ctx.fillRect(x, y, 1, 1);
      return false;
    }

    case 'lead': {
      const v = (cell.seed / 255 - 0.5) * 8;
      ctx.fillStyle = `rgb(${75 + v|0},${75 + v|0},${90 + v|0})`;
      ctx.fillRect(x, y, 1, 1);
      return false;
    }

    case 'blackhole': {
      const pulse = Math.sin(Date.now() * 0.004 + cell.seed * 2) * 20;
      ctx.fillStyle = `rgb(${100 + pulse * 0.3|0},${40 + pulse * 0.2|0},${180 + pulse|0})`;
      ctx.fillRect(x, y, 1, 1);
      return true;
    }

    case 'antigrav': {
      const pulse2 = Math.sin(Date.now() * 0.005 + cell.seed) * 15;
      ctx.fillStyle = `rgb(${100 + pulse2 * 0.2|0},${220 + pulse2 * 0.3|0},${255})`;
      ctx.fillRect(x, y, 1, 1);
      return true;
    }

    case 'acidgas': {
      const lifeFrac = Math.max(0.1, cell.life / cell.maxLife);
      const alpha = Math.min(0.6, lifeFrac * 0.7);
      ctx.fillStyle = `rgba(${100 + Math.sin(cell.life * 0.1) * 10|0},${230},${50},${alpha})`;
      ctx.fillRect(x, y, 1, 1);
      return true;
    }

    case 'poison': {
      const wobble = Math.sin(Date.now() * 0.006 + cell.seed) * 8;
      ctx.fillStyle = `rgba(${170 + wobble * 0.3|0},${50 + wobble * 0.2|0},${200 + wobble|0},0.7)`;
      ctx.fillRect(x, y, 1, 1);
      return true;
    }

    case 'pressure_plate': {
      const trigger = cell.powered ? 60 : 0;
      ctx.fillStyle = `rgb(${120 + trigger|0},${120 + trigger * 0.5|0},${140 + trigger * 0.3|0})`;
      ctx.fillRect(x, y, 1, 1);
      return !!cell.powered;
    }

    case 'and_gate': {
      if (cell.powered) {
        ctx.fillStyle = `rgb(${220},${190},${80})`;
      } else {
        ctx.fillStyle = 'rgb(140,110,40)';
      }
      ctx.fillRect(x, y, 1, 1);
      return !!cell.powered;
    }

    case 'not_gate': {
      if (cell.powered) {
        ctx.fillStyle = `rgb(${220},${150},${80})`;
      } else {
        ctx.fillStyle = 'rgb(140,90,40)';
      }
      ctx.fillRect(x, y, 1, 1);
      return !!cell.powered;
    }

    case 'solar': {
      const bright = cell.powered ? 1 : 0.5;
      const p = Math.sin(Date.now() * 0.003 + cell.seed) * 10;
      ctx.fillStyle = `rgb(${255 * bright|0},${(220 + p) * bright|0},${(50 + p * 0.5) * bright|0})`;
      ctx.fillRect(x, y, 1, 1);
      return !!cell.powered;
    }

    case 'fan': {
      if (cell.powered) {
        const spin = Math.sin(Date.now() * 0.01 + cell.seed) * 20;
        ctx.fillStyle = `rgb(${60 + spin * 0.3|0},${170 + spin * 0.5|0},${200 + spin * 0.3|0})`;
      } else {
        ctx.fillStyle = 'rgb(60,130,160)';
      }
      ctx.fillRect(x, y, 1, 1);
      return !!cell.powered;
    }

    case 'delay': {
      const fill = cell.powered ? (cell.timer || 0) / 60 : 0;
      if (cell.powered) {
        ctx.fillStyle = `rgb(${170 + fill * 50|0},${140 + fill * 60|0},${110 + fill * 80|0})`;
      } else {
        ctx.fillStyle = 'rgb(120,100,80)';
      }
      ctx.fillRect(x, y, 1, 1);
      return !!cell.powered;
    }

    case 'pump': {
      if (cell.powered) {
        const throb = Math.sin(Date.now() * 0.008 + cell.seed) * 0.3 + 0.7;
        ctx.fillStyle = `rgb(${50 * throb|0},${160 * throb|0},${180 * throb|0})`;
      } else {
        ctx.fillStyle = 'rgb(40,120,140)';
      }
      ctx.fillRect(x, y, 1, 1);
      return !!cell.powered;
    }

    case 'lightning_rod': {
      const v = (cell.seed / 255 - 0.5) * 10;
      ctx.fillStyle = `rgb(${100 + v|0},${140 + v * 0.5|0},${210 + v * 0.3|0})`;
      ctx.fillRect(x, y, 1, 1);
      return false;
    }

    case 'firefly': {
      const glow = Math.sin(Date.now() * 0.01 + cell.seed * 3) * 0.4 + 0.6;
      ctx.fillStyle = `rgba(255,230,80,${glow})`;
      ctx.fillRect(x, y, 1, 1);
      return true;
    }

    case 'algae': {
      const pulse = Math.sin(Date.now() * 0.005 + cell.seed) * 8;
      ctx.fillStyle = `rgb(${60 + pulse|0},${190 + pulse * 0.5|0},${100 + pulse * 0.3|0})`;
      ctx.fillRect(x, y, 1, 1);
      return false;
    }

    case 'termite': {
      const w = Math.sin(Date.now() * 0.01 + cell.seed) > 0 ? 0 : 10;
      ctx.fillStyle = `rgb(${140 + w|0},${80 + w * 0.3|0},${50 + w * 0.2|0})`;
      ctx.fillRect(x, y, 1, 1);
      return false;
    }

    case 'coral': {
      const p = Math.sin(Date.now() * 0.004 + cell.seed) * 10;
      ctx.fillStyle = `rgb(${220 + p|0},${100 + p * 0.5|0},${160 + p * 0.3|0})`;
      ctx.fillRect(x, y, 1, 1);
      return false;
    }

    case 'root': {
      ctx.fillStyle = 'rgb(130,100,70)';
      ctx.fillRect(x, y, 1, 1);
      return false;
    }

    case 'pipe': {
      ctx.fillStyle = 'rgb(65,85,105)';
      ctx.fillRect(x, y, 1, 1);
      ctx.fillStyle = 'rgb(100,125,145)';
      ctx.fillRect(x + 0.15, y + 0.15, 0.7, 0.7);
      if (cell.contains && cell.contains.type) {
        const c = liquidColor(cell.contains.type);
        if (c) { ctx.fillStyle = c; ctx.fillRect(x + 0.25, y + 0.25, 0.5, 0.5); }
      }
      return false;
    }

    default:
      return false;
  }
}

function render() {
  // Cinematic radial background with vignette
  const bgGrad = ctx.createRadialGradient(COLS/2, ROWS/2.5, 0, COLS/2, ROWS/2, COLS*0.7);
  bgGrad.addColorStop(0, '#0e0e24');
  bgGrad.addColorStop(0.3, '#0a0a1a');
  bgGrad.addColorStop(0.6, '#060612');
  bgGrad.addColorStop(1, '#020208');
  ctx.fillStyle = bgGrad;
  ctx.fillRect(0, 0, COLS, ROWS);
  // Vignette overlay
  const vigGrad = ctx.createRadialGradient(COLS/2, ROWS/2, COLS*0.2, COLS/2, ROWS/2, COLS*0.8);
  vigGrad.addColorStop(0, 'rgba(0,0,0,0)');
  vigGrad.addColorStop(0.5, 'rgba(0,0,0,0)');
  vigGrad.addColorStop(0.8, 'rgba(0,0,8,0.3)');
  vigGrad.addColorStop(1, 'rgba(0,0,12,0.6)');
  ctx.fillStyle = vigGrad;
  ctx.fillRect(0, 0, COLS, ROWS);

  gctx.clearRect(0, 0, COLS, ROWS);

  for (let y = 0; y < ROWS; y++) {
    for (let x = 0; x < COLS; x++) {
      const cell = grid[y][x];
      if (!cell) continue;
      const needsGlow = drawCell(x, y, cell);
      if (needsGlow) {
        if (cell.type === 'acid') {
          gctx.fillStyle = 'rgba(102,221,51,0.25)';
        } else if (cell.type === 'mover') {
          gctx.fillStyle = 'rgba(0,204,204,0.25)';
        } else if (cell.type === 'uranium') {
          const intensity = 0.25 + Math.min((cell.temp || 0) / 150, 1) * 0.35;
          gctx.fillStyle = `rgba(50,255,50,${intensity})`;
        } else if (cell.type === 'source') {
          gctx.fillStyle = 'rgba(80,200,255,0.35)';
        } else if (cell.type === 'battery') {
          gctx.fillStyle = 'rgba(255,180,50,0.40)';
        } else if (cell.type === 'wire' && cell.powered) {
          const i = Math.min(1, (cell.life || 0) / 5);
          gctx.fillStyle = `rgba(50,180,255,${0.15 + 0.25 * i})`;
        } else if (cell.type === 'switch' && cell.powered) {
          gctx.fillStyle = 'rgba(50,255,50,0.35)';
        } else if (cell.type === 'led' && cell.powered) {
          const i = Math.min(1, (cell.life || 0) / 20);
          gctx.fillStyle = `rgba(255,255,200,${0.20 + 0.40 * i})`;
        } else if (cell.type === 'heater' && cell.powered) {
          const i = Math.min(1, (cell.temp || 0) / 500);
          gctx.fillStyle = `rgba(255,80,30,${0.15 + 0.35 * i})`;
        } else if (cell.type === 'steamgen' && cell.powered) {
          const i = Math.min(1, (cell.life || 0) / 5);
          gctx.fillStyle = `rgba(60,180,255,${0.10 + 0.30 * i})`;
        } else if (cell.type === 'turbine' && cell.powered) {
          const i = Math.min(1, (cell.life || 0) / 5);
          gctx.fillStyle = `rgba(100,220,255,${0.10 + 0.30 * i})`;
        } else if (cell.type === 'piston' && cell.powered) {
          gctx.fillStyle = 'rgba(220,150,100,0.25)';
        } else if (cell.type === 'sensor' && cell.powered) {
          const i = Math.min(1, (cell.life || 0) / 5);
          gctx.fillStyle = `rgba(150,220,255,${0.10 + 0.25 * i})`;
        } else if (cell.type === 'spore') {
          gctx.fillStyle = 'rgba(200,100,220,0.20)';
        } else if (cell.type === 'heatwire' && cell.powered) {
          const i = Math.min(1, (cell.temp || 0) / 300);
          gctx.fillStyle = `rgba(255,120,40,${0.15 + 0.40 * i})`;
        } else if (cell.type === 'sparkler') {
          const i = Math.max(0.2, (cell.life || 0) / (cell.maxLife || 100));
          gctx.fillStyle = `rgba(255,220,100,${0.20 + 0.35 * i})`;
        } else if (cell.type === 'tesla' && cell.powered) {
          gctx.fillStyle = 'rgba(100,170,255,0.35)';
        } else if (cell.type === 'nitro') {
          gctx.fillStyle = 'rgba(160,220,255,0.20)';
        } else if (cell.type === 'portal_blue') {
          gctx.fillStyle = 'rgba(80,150,255,0.30)';
        } else if (cell.type === 'portal_orange') {
          gctx.fillStyle = 'rgba(255,150,80,0.30)';
        } else if (cell.type === 'meteor') {
          const i = Math.min(1, (cell.temp || 0) / 500);
          gctx.fillStyle = `rgba(255,80,30,${0.20 + 0.40 * i})`;
        } else if (cell.type === 'oil') {
          gctx.fillStyle = 'rgba(220,180,60,0.25)';
        } else if (cell.type === 'blackhole') {
          gctx.fillStyle = 'rgba(150,50,255,0.35)';
        } else if (cell.type === 'antigrav') {
          gctx.fillStyle = 'rgba(100,220,255,0.25)';
        } else if (cell.type === 'acidgas') {
          gctx.fillStyle = 'rgba(100,230,50,0.20)';
        } else if (cell.type === 'poison') {
          gctx.fillStyle = 'rgba(180,60,220,0.25)';
        } else if (cell.type === 'pressure_plate' && cell.powered) {
          gctx.fillStyle = 'rgba(150,150,180,0.25)';
        } else if (cell.type === 'and_gate' && cell.powered) {
          gctx.fillStyle = 'rgba(220,190,80,0.30)';
        } else if (cell.type === 'not_gate' && cell.powered) {
          gctx.fillStyle = 'rgba(220,150,80,0.30)';
        } else if (cell.type === 'solar' && cell.powered) {
          gctx.fillStyle = 'rgba(255,230,60,0.30)';
        } else if (cell.type === 'fan' && cell.powered) {
          gctx.fillStyle = 'rgba(100,220,255,0.25)';
        } else if (cell.type === 'delay' && cell.powered) {
          gctx.fillStyle = 'rgba(200,170,130,0.25)';
        } else if (cell.type === 'pump' && cell.powered) {
          gctx.fillStyle = 'rgba(60,200,220,0.25)';
        } else if (cell.type === 'firefly') {
          gctx.fillStyle = 'rgba(255,240,100,0.30)';
        } else {
          gctx.fillStyle = 'rgba(255,120,40,0.30)';
        }
        gctx.fillRect(x, y, 1, 1);
      }
    }
  }

  ctx.save();
  ctx.globalCompositeOperation = 'screen';
  ctx.filter = 'blur(2px)';
  ctx.drawImage(glowCanvas, 0, 0);
  ctx.restore();

  // Visual particles (splash, sparks)
  for (let pi = particles.length - 1; pi >= 0; pi--) {
    const p = particles[pi];
    p.life--;
    if (p.life <= 0) { particles.splice(pi, 1); continue; }
    const frac = p.life / p.maxLife;
    p.x += p.vx * 0.5;
    p.y += p.vy * 0.5;
    p.vy += 0.05; // gravity
    if (p.x < 0 || p.x >= COLS || p.y < 0 || p.y >= ROWS) { particles.splice(pi, 1); continue; }
    ctx.save();
    ctx.shadowBlur = 6 * frac;
    ctx.shadowColor = p.color.replace('1)', `${0.3 * frac})`);
    ctx.globalAlpha = frac * 0.8;
    ctx.fillStyle = p.color;
    const size = Math.max(0.5, p.size * frac);
    ctx.fillRect(p.x - size/2, p.y - size/2, size, size);
    ctx.restore();
  }
  ctx.globalAlpha = 1;

  // Explosion flash overlay
  if (explosionFlash.timer > 0) {
    const t = explosionFlash.timer;
    const maxT = explosionFlash.maxT || 15;
    const intensity = t / maxT;
    const fx = explosionFlash.x, fy = explosionFlash.y;
    const radius = explosionFlash.radius || 30;

    ctx.save();
    ctx.globalCompositeOperation = 'screen';

    // Core white flash
    const grad = ctx.createRadialGradient(fx, fy, 0, fx, fy, radius + (maxT - t) * 5);
    grad.addColorStop(0, `rgba(255,255,255,${0.95 * intensity})`);
    grad.addColorStop(0.1, `rgba(255,255,200,${0.8 * intensity})`);
    grad.addColorStop(0.3, `rgba(255,200,100,${0.5 * intensity})`);
    grad.addColorStop(0.6, `rgba(255,120,40,${0.25 * intensity})`);
    grad.addColorStop(1, 'rgba(255,50,10,0)');
    ctx.fillStyle = grad;
    ctx.filter = 'blur(2px)';
    ctx.fillRect(0, 0, COLS, ROWS);

    // Shockwave ring
    if (t > maxT * 0.3) {
      const ringRadius = radius * (1 + (maxT - t) / maxT * 1.5);
      const ringWidth = 8 + (maxT - t) * 0.5;
      ctx.beginPath();
      ctx.arc(fx, fy, ringRadius, 0, Math.PI * 2);
      ctx.strokeStyle = `rgba(255,220,150,${0.3 * intensity})`;
      ctx.lineWidth = ringWidth;
      ctx.filter = 'blur(4px)';
      ctx.stroke();
    }

    // Spark rays
    if (t > maxT * 0.5) {
      for (let i = 0; i < 12; i++) {
        const angle = (i / 12) * Math.PI * 2 + t * 0.2;
        const dist = radius * 0.3 + Math.random() * radius * 0.4;
        const sx = fx + Math.cos(angle) * dist;
        const sy = fy + Math.sin(angle) * dist;
        const sparkSize = 2 + Math.random() * 3;
        ctx.fillStyle = `rgba(255,255,200,${0.2 * intensity})`;
        ctx.filter = 'blur(1px)';
        ctx.fillRect(sx - sparkSize/2, sy - sparkSize/2, sparkSize, sparkSize);
      }
    }

    ctx.restore();
    explosionFlash.timer--;
  }

  // Tesla arcs & shocker arcs
  const arcPulse = 0.7 + 0.3 * Math.sin(Date.now() / 80);
  for (let ai = teslaArcs.length - 1; ai >= 0; ai--) {
    const arc = teslaArcs[ai];
    arc.timer--;
    if (arc.timer <= 0) { teslaArcs.splice(ai, 1); continue; }
    const intensity = arc.timer / arc.maxTimer;

    if (arc.x1 !== undefined) {
      // Point-to-point zigzag arc (shocker)
      const segs = arc.segments || 4;
      ctx.save();
      ctx.shadowBlur = 16 * arcPulse;
      ctx.shadowColor = 'rgba(60,200,255,0.7)';
      ctx.strokeStyle = `rgba(150,220,255,${0.5 + 0.4 * intensity})`;
      ctx.lineWidth = 1.5 + 0.5 * arcPulse;
      ctx.beginPath();
      ctx.moveTo(arc.x1, arc.y1);
      for (let s = 0; s <= segs; s++) {
        const frac = s / segs;
        const px = arc.x1 + (arc.x2 - arc.x1) * frac + (Math.random() - 0.5) * 2.5;
        const py = arc.y1 + (arc.y2 - arc.y1) * frac + (Math.random() - 0.5) * 2.5;
        ctx.lineTo(px, py);
      }
      ctx.lineTo(arc.x2, arc.y2);
      ctx.stroke();
      ctx.restore();
    } else if (arc.x !== undefined) {
      // Radial tesla coil arcs
      const branches = 3 + (arc.seed % 4);
      for (let b = 0; b < branches; b++) {
        const angle = (b / branches) * Math.PI * 2 + arc.seed * 0.1;
        const len = 4 + (arc.seed % 8);
        let lx = arc.x, ly = arc.y;
        ctx.save();
        ctx.shadowBlur = 14 * arcPulse;
        ctx.shadowColor = 'rgba(100,200,255,0.6)';
        for (let d = 0; d < len; d++) {
          const nx = lx + Math.round(Math.cos(angle + d * 0.3) * (1 + Math.random() * 0.5));
          const ny = ly + Math.round(Math.sin(angle + d * 0.3) * (1 + Math.random() * 0.5));
          if (!inBounds(nx, ny)) break;
          const alpha = (0.3 + 0.5 * intensity) * (1 - d / len);
          ctx.fillStyle = `rgba(150,200,255,${alpha})`;
          ctx.fillRect(nx, ny, 1, 1);
          lx = nx; ly = ny;
          if (Math.random() < 0.3) break;
        }
        ctx.restore();
      }
    }
  }

  // Ping markers
  for (let pi = pings.length - 1; pi >= 0; pi--) {
    const p = pings[pi];
    p.timer--;
    if (p.timer <= 0) { pings.splice(pi, 1); continue; }
    const alpha = Math.min(1, p.timer / 30);
    ctx.save();
    ctx.font = '16px sans-serif';
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    ctx.globalAlpha = alpha;
    ctx.fillText(p.emoji, p.x, p.y - 4 - (1 - alpha) * 6);
    ctx.restore();
  }

  // Selection rectangle
  if (selectMode && selectStart && selectEnd) {
    const sx = Math.min(selectStart.x, selectEnd.x);
    const sy = Math.min(selectStart.y, selectEnd.y);
    const ex = Math.max(selectStart.x, selectEnd.x);
    const ey = Math.max(selectStart.y, selectEnd.y);
    ctx.save();
    ctx.strokeStyle = 'rgba(100,170,255,0.6)';
    ctx.lineWidth = 1;
    ctx.setLineDash([4, 4]);
    ctx.strokeRect(sx, sy, ex - sx, ey - sy);
    ctx.fillStyle = 'rgba(100,170,255,0.08)';
    ctx.fillRect(sx, sy, ex - sx, ey - sy);
    ctx.restore();
  }

  // Friend cursor — now with colored ring and nickname
  if (friendCursor) {
    friendCursorTimer--;
    if (friendCursorTimer <= 0) { friendCursor = null; }
    else {
      const alpha = Math.min(1, friendCursorTimer / 30) * 0.8;
      ctx.save();
      const hue = (friendCursor.seed || 0) * 360;
      ctx.strokeStyle = `hsla(${hue},80%,60%,${alpha})`;
      ctx.lineWidth = 2;
      ctx.shadowColor = `hsla(${hue},80%,60%,0.5)`;
      ctx.shadowBlur = 8;
      ctx.beginPath();
      ctx.arc(friendCursor.x, friendCursor.y, 4, 0, Math.PI * 2);
      ctx.stroke();
      // Nickname
      ctx.fillStyle = `hsla(${hue},80%,60%,${alpha})`;
      ctx.font = '8px sans-serif';
      ctx.textAlign = 'center';
      ctx.fillText(friendCursor.name || 'Friend', friendCursor.x, friendCursor.y - 8);
      ctx.restore();
    }
  }

  // Thermometer UI
  if (mouseOverCanvas && mouseX >= 0 && mouseY >= 0) {
    const tx = Math.floor(mouseX), ty = Math.floor(mouseY);
    const thermoCell = getCell(tx, ty);
    const thermoEl = document.getElementById('thermo-display');
    if (thermoCell) {
      thermoEl.style.display = 'block';
      thermoEl.textContent = (thermoCell.type || '?') + ' | ' + ((thermoCell.temp || 0).toFixed(0)) + '°C';
    } else {
      thermoEl.style.display = 'block';
      thermoEl.textContent = 'Пусто | --°C';
    }
  } else {
    document.getElementById('thermo-display').style.display = 'none';
  }

  // Brush preview circle
  if (mouseOverCanvas && mouseX >= 0 && mouseY >= 0) {
    const r = brushSize / 2;
    ctx.save();
    ctx.strokeStyle = 'rgba(255,255,255,0.25)';
    ctx.lineWidth = 1;
    ctx.setLineDash([3, 3]);
    ctx.beginPath();
    ctx.arc(mouseX, mouseY, r, 0, Math.PI * 2);
    ctx.stroke();
    ctx.restore();
  }

  // Local player
  if (player) {
    drawPlayer(ctx, player.x, player.y, player.dir, player.seed, 1);
  }
  // Remote player
  if (friendPlayer) {
    drawPlayer(ctx, friendPlayer.x, friendPlayer.y, friendPlayer.dir || 1, friendPlayer.seed || 0, 0.6);
  }
}

function drawPlayer(ctx, px, py, dir, seed, alpha) {
  const ix = Math.floor(px);
  const iy = Math.floor(py);
  ctx.save();
  ctx.globalAlpha = alpha;

  // Body colors
  const skin = 'rgb(255,200,150)';
  const shirt = seed % 2 === 0 ? 'rgb(60,120,200)' : 'rgb(200,80,60)';
  const pants = 'rgb(60,60,80)';
  const eyes = seed % 3 === 0 ? '#44ff44' : '#ffffff';

  // Head (2x2)
  ctx.fillStyle = skin;
  ctx.fillRect(ix, iy - 3, 3, 2);
  // Eyes
  ctx.fillStyle = eyes;
  ctx.fillRect(ix + (dir > 0 ? 2 : 0), iy - 3, 1, 1);
  // Body (2x2)
  ctx.fillStyle = shirt;
  ctx.fillRect(ix, iy - 1, 3, 2);
  // Legs (2x1)
  ctx.fillStyle = pants;
  ctx.fillRect(ix, iy + 1, 3, 1);

  ctx.restore();
}

// ----- Element Spawning -----
function spawnElement(x, y, type) {
  if (!inBounds(x, y)) return;
  if (grid[y][x] !== null) return;

  const cell = { type: type, seed: Math.floor(Math.random() * 256), temp: 0 };

  // Mark host-placed cells for anti-griefing
  if (isHost) {
    const protectedTypes = ['wall', 'wire', 'heatwire', 'switch', 'led', 'heater', 'steamgen', 'turbine', 'cooler', 'piston', 'sensor', 'tesla', 'button', 'battery', 'stone', 'glass', 'lead', 'pressure_plate', 'and_gate', 'not_gate', 'solar', 'fan', 'delay', 'pump', 'lightning_rod', 'portal_blue', 'portal_orange'];
    if (protectedTypes.indexOf(type) !== -1) cell.hostPlaced = true;
  }

  if (type === 'fire') {
    cell.maxLife = 60 + Math.floor(Math.random() * 60);
    cell.life = cell.maxLife;
    cell.temp = 600 + Math.floor(Math.random() * 200);
  } else if (type === 'smoke') {
    cell.maxLife = 180 + Math.floor(Math.random() * 180);
    cell.life = cell.maxLife;
  } else if (type === 'uranium') {
    cell.temp = 30 + Math.floor(Math.random() * 20);
  } else if (type === 'steam') {
    cell.maxLife = 40 + Math.floor(Math.random() * 30);
    cell.life = cell.maxLife;
    cell.temp = 80 + Math.floor(Math.random() * 40);
  } else if (type === 'battery') {
    cell.powered = true;
    cell.life = 5;
  } else if (type === 'switch') {
    cell.active = false;
  } else if (type === 'sparkler') {
    cell.maxLife = 300 + Math.floor(Math.random() * 200);
    cell.life = cell.maxLife;
    cell.temp = 200;
  } else if (type === 'gasoline') {
    cell.temp = 20;
  } else if (type === 'lava') {
    cell.temp = 800 + Math.floor(Math.random() * 400);
  } else if (type === 'tesla') {
    cell.powered = false;
    cell.life = 0;
  } else if (type === 'nitro') {
    cell.temp = -200;
  } else if (type === 'ice') {
    cell.temp = -10;
  } else if (type === 'meteor') {
    cell.temp = 1000;
    cell.life = 0;
    cell.maxLife = 0;
  } else if (type === 'portal_blue') {
    cell.temp = 20;
  } else if (type === 'portal_orange') {
    cell.temp = 20;
  } else if (type === 'oil') {
    cell.temp = 20;
  } else if (type === 'acidgas') {
    cell.maxLife = 120 + Math.floor(Math.random() * 60);
    cell.life = cell.maxLife;
    cell.temp = 20;
  } else if (type === 'pressure_plate') {
    cell.powered = false;
  } else if (type === 'and_gate' || type === 'not_gate') {
    cell.powered = false;
  } else if (type === 'solar') {
    cell.powered = false;
  } else if (type === 'fan') {
    cell.powered = false;
  } else if (type === 'delay') {
    cell.powered = false;
    cell.timer = 0;
  } else if (type === 'pump') {
    cell.powered = false;
  } else if (type === 'firefly') {
    cell.life = 200 + Math.floor(Math.random() * 200);
    cell.maxLife = cell.life;
  } else if (type === 'algae') {
    cell.temp = 20;
  } else if (type === 'termite') {
    cell.life = 300 + Math.floor(Math.random() * 200);
  } else if (type === 'pipe') {
    cell.contains = null;
    cell.temp = 20;
  }

  grid[y][x] = cell;
}

function spawnBrushAt(mx, my, element) {
  const cx = Math.floor(mx);
  const cy = Math.floor(my);
  const half = Math.floor(brushSize / 2);

  for (let dy = 0; dy < brushSize; dy++) {
    for (let dx = 0; dx < brushSize; dx++) {
      const x = cx + dx - half;
      const y = cy + dy - half;
      if (brushShape === 'circle') {
        const dist = Math.sqrt((dx - half) * (dx - half) + (dy - half) * (dy - half));
        if (dist > half + 0.5) continue;
        if (dist > half - 0.3 && Math.random() > 0.5) continue;
      } else {
        if (brushSize > 2) {
          const dist = Math.abs(dx - half) + Math.abs(dy - half);
          if (dist > half && Math.random() > 0.4) continue;
        }
      }
      spawnElement(x, y, element);
    }
  }

  if (element === 'fire' && brushSize >= 2) {
    for (let i = 0; i < brushSize * 2; i++) {
      const ox = cx + Math.floor(Math.random() * brushSize) - half;
      const oy = cy + Math.floor(Math.random() * brushSize) - half;
      spawnElement(ox, oy, 'fire');
    }
  }
}

function eraseAt(mx, my) {
  if (selectMode) return;
  const cx = Math.floor(mx);
  const cy = Math.floor(my);
  const half = Math.floor(brushSize / 2);
  for (let dy = 0; dy < brushSize; dy++) {
    for (let dx = 0; dx < brushSize; dx++) {
      const x = cx + dx - half;
      const y = cy + dy - half;
      if (!inBounds(x, y)) continue;
      const t = grid[y][x];
      if (t && t.hostPlaced && pvpMode && !isHost) continue;
      grid[y][x] = null;
    }
  }
}

function placeAtMouse2(mx, my) {
  if (selectMode) return;
  const cx = Math.floor(mx);
  const cy = Math.floor(my);
  if (selectedElement === 'switch') {
    const cell = getCell(cx, cy);
    if (cell && cell.type === 'switch') {
      cell.active = !cell.active;
      return;
    }
  }
  // Button click detection
  if (selectedElement === 'button') {
    const cell = getCell(cx, cy);
    if (cell && cell.type === 'button') {
      cell.pressed = true;
      return;
    }
  }
  spawnBrushAt(mx, my, selectedElement);
}

// Map CSS coords → canvas grid
function canvasCoords(e) {
  const rect = canvas.getBoundingClientRect();
  return {
    mx: (e.clientX - rect.left) * canvas.width / rect.width,
    my: (e.clientY - rect.top)  * canvas.height / rect.height,
  };
}

// ----- Mouse / Touch Input -----
let isMouseDown = false;
let mouseButton = -1;

canvas.addEventListener('mousedown', (e) => {
  initAudio();
  isMouseDown = true;
  mouseButton = e.button;
  const { mx, my } = canvasCoords(e);

  if (e.button === 0) {
    // Left click = Build
    placeAtMouse2(mx, my);
  } else if (e.button === 2) {
    // Right click = Eraser
    eraseAt(mx, my);
  }
  // Button 1 (middle) handled by ping listener
});
canvas.addEventListener('mousemove', (e) => {
  const { mx, my } = canvasCoords(e);
  mouseX = mx; mouseY = my;
  if (isMouseDown) {
    if (mouseButton === 0) {
      placeAtMouse2(mx, my);
    } else if (mouseButton === 2) {
      eraseAt(mx, my);
    }
    sendWS({ type: 'cursor', x: mx, y: my, seed: Math.random() * 256 | 0, name: 'Player' });
  }
});
canvas.addEventListener('mouseup',   () => { isMouseDown = false; mouseButton = -1; });
canvas.addEventListener('mouseleave', () => { isMouseDown = false; mouseOverCanvas = false; });
canvas.addEventListener('mouseenter', () => { mouseOverCanvas = true; });

canvas.addEventListener('wheel', (e) => {
  e.preventDefault();
  const delta = e.deltaY > 0 ? -0.1 : 0.1;
  zoom = Math.max(0.5, Math.min(5, zoom + delta));
  resizeCanvas();
}, { passive: false });

canvas.addEventListener('contextmenu', (e) => e.preventDefault());

canvas.addEventListener('touchstart', (e) => {
  e.preventDefault();
  const { mx, my } = canvasCoords(e.touches[0]);
  mouseX = mx; mouseY = my;
  isMouseDown = true;
  mouseButton = 0;
  placeAtMouse2(mx, my);
}, { passive: false });
canvas.addEventListener('touchmove', (e) => {
  e.preventDefault();
  if (isMouseDown) {
    const { mx, my } = canvasCoords(e.touches[0]);
    mouseX = mx; mouseY = my;
    placeAtMouse2(mx, my);
  }
}, { passive: false });
canvas.addEventListener('touchend', () => { isMouseDown = false; });

function applyButtonGlow(btn, active) {
  const color = btn.style.getPropertyValue('--glow').trim();
  if (active) {
    btn.style.boxShadow = `0 0 10px ${color}, 0 0 25px ${color}`;
    btn.style.borderColor = color;
    btn.style.background = '#1a1a3a';
  } else {
    btn.style.boxShadow = 'none';
    btn.style.borderColor = '#222244';
    btn.style.background = '#12122a';
  }
}

document.querySelectorAll('.tool-btn').forEach(btn => {

    document.querySelectorAll('.tool-btn').forEach(b => {

});

function sendChat() {
  const input = document.getElementById('chat-input');
  const text = input.value.trim();
  if (!text) return;
  input.value = '';

  // Commands
  if (text.startsWith('/')) {
    const parts = text.split(' ');
    const cmd = parts[0].toLowerCase();
    if (cmd === '/gravity' && parts[1]) {
      const val = parseFloat(parts[1]);
      if (val >= 0 && val <= 1) {
        gravityFactor = val;
        gravSlider.value = val * 5;
        gravValue.textContent = gravityFactor.toFixed(1);
        sendWS({ type: 'gravity', gravity: gravityFactor });
        addChat('Система', 'Гравитация: ' + gravityFactor.toFixed(1));
      }
    } else if (cmd === '/speed' && parts[1]) {
      const val = parseFloat(parts[1]);
      if (val >= 1 && val <= 5) {
        speed = val;
        speedSlider.value = val * 10;
        speedValue.textContent = speed.toFixed(1) + 'x';
        addChat('Система', 'Скорость: ' + speed.toFixed(1) + 'x');
      }
    } else if (cmd === '/weather' && parts[1]) {
      const val = parseInt(parts[1]);
      if (val >= 0 && val <= 3) {
        const weathers = ['Ясно', 'Ветер', 'Шторм', 'Кислотный дождь'];
        if (val === 0) windPower = 0;
        else if (val === 1) windPower = 2;
        else if (val === 2) windPower = 5;
        else if (val === 3) { windPower = 3; /* could spawn acid later */ }
        windSlider.value = windPower;
        windValue.textContent = windPower;
        sendWS({ type: 'wind', wind: windPower });
        addChat('Система', 'Погода: ' + weathers[val]);
      }
    } else if (cmd === '/clear') {
      clearGrid();
      addChat('Система', 'Карта очищена');
    } else {
      addChat('Система', 'Неизвестная команда: ' + cmd);
    }
    return;
  }

  addChat('Я', text);
  sendWS({ type: 'chat', text: text });
}

// Mission system
function checkMissions() {
  if (!missionActive) return;
  let progress = 0;
  if (missionType === 'steam') {
    let count = 0;
    for (let y = 0; y < ROWS; y++) {
      for (let x = 0; x < COLS; x++) {
        const c = grid[y][x];
        if (c && c.type === 'steam') count++;
      }
    }
    progress = Math.min(missionMax, count);
  } else if (missionType === 'led') {
    let count = 0;
    for (let y = 0; y < ROWS; y++) {
      for (let x = 0; x < COLS; x++) {
        const c = grid[y][x];
        if (c && c.type === 'led' && c.powered) count++;
      }
    }
    progress = Math.min(missionMax, count);
  } else if (missionType === 'tree') {
    let maxH = 0;
    for (let y = 0; y < ROWS; y++) {
      for (let x = 0; x < COLS; x++) {
        const c = grid[y][x];
        if (c && c.type === 'wood') {
          // Find the top of this tree
          let top = y;
          for (let py = y - 1; py >= 0; py--) {
            if (grid[py][x] && grid[py][x].type === 'wood') top = py;
            else break;
          }
          maxH = Math.max(maxH, y - top + 1);
        }
      }
    }
    progress = Math.min(missionMax, maxH);
  }
  missionProgress = progress;
  document.getElementById('mission-bar').style.width = (progress / missionMax * 100) + '%';
  if (progress >= missionMax) {
    addChat('🎯 Миссия', 'Выполнена!');
    missionActive = false;
    document.getElementById('mission-banner').style.display = 'none';
    // Give new mission after delay
    setTimeout(generateMission, 10000);
  }
}

  const types = ['steam', 'led', 'tree'];
  const labels = {
    steam: 'Сгенерируйте 1000 единиц пара',
    led: 'Зажгите одновременно 5 LED лампочек',
    tree: 'Вырастите дерево из семян высотой 40 блоков'

}
